<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>کالیبراسیون مختصات فرم</title>
  <style>
    body{font-family:sans-serif;background:#f2f4f8;padding:16px}
    .bar{max-width:980px;margin:0 auto 12px;background:#fff;padding:12px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,.08)}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    select,input,button{padding:10px;border-radius:10px;border:1px solid #cbd5e1;font-size:14px}
    button{cursor:pointer;background:#0f172a;color:#fff;border:none}
    .wrap{max-width:980px;margin:0 auto}
    canvas{width:100%;background:#fff;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,.08)}
    code{display:block;direction:ltr;unicode-bidi:plaintext;background:#0b1020;color:#e2e8f0;padding:10px;border-radius:12px;margin-top:10px;overflow:auto}
  </style>
</head>
<body>

<div class="bar">
  <div class="row">
    <div>فیلد:</div>
   <select id="fieldKey">
    </select>

    <div>سایز فونت:</div>
    <input id="fontSize" type="number" value="11" style="width:80px" />

    <div>صفحه:</div>
    <select id="pageIndex">
      <option value="0">0</option>
      <!-- اگر PDF چند صفحه است، 1،2... اضافه کن -->
    </select>

    <button id="copyJson">کپی JSON</button>
  </div>

  <div>روی جای دقیق همان فیلد در PDF کلیک کن. خروجی مختصات پایین می‌آید.</div>
  <code id="out">{}</code>
</div>

<div class="wrap">
  <canvas id="c"></canvas>
</div>

<!-- pdf.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<script>
(async function () {
    // === همان Schema پروژه اصلی (کپی از فایل فرم مرحله‌ای) ===
  const formSchema = {
    "formTitle": "پرسشنامه درخواست صدور گذرنامه",
    "sections": [
      {
        "id": "identity",
        "title": "اطلاعات هویتی",
        "questions": [
          "نام شما چیست؟",
          "نام خانوادگی شما چیست؟",
          "نام شما به انگلیسی (با حروف بزرگ) چیست؟",
          "نام خانوادگی شما به انگلیسی (با حروف بزرگ) چیست؟",
          "نام قبلی شما چیست؟",
          "تاریخ تولد شما به سال شمسی چیست؟",
          "محل تولد شما کجاست؟",
          "نام پدر شما چیست؟",
          "شماره شناسنامه شما چیست؟",
          "محل صدور شناسنامه شما کجاست؟",
          "تاریخ صدور شناسنامه شما چیست؟",
          "سریال شناسنامه شما چیست؟",
          "شماره سری شناسنامه شما چیست؟",
          "جنسیت شما چیست؟",
          "دین شما چیست؟",
          "وضعیت تأهل شما چیست؟",
          "میزان تحصیلات شما چیست؟",
          "رشته تحصیلی شما چیست؟"
        ]
      },
      {
        "id": "physical",
        "title": "مشخصات ظاهری",
        "questions": [
          "قد شما چند سانتی‌متر است؟",
          "وزن شما چند کیلوگرم است؟",
          "رنگ چهره شما چیست؟ (سفید / گندمگون / سبز / تیره / سایر)",
          "رنگ چشم شما چیست؟ (مشکی / میشی / سبز / آبی / قهوه‌ای / عسلی / سایر)",
          "آیا دارای علائم ممیزه هستید؟ در صورت وجود توضیح دهید."
        ]
      },
      {
        "id": "job",
        "title": "اطلاعات شغلی",
        "questions": [
          "شغل فعلی شما چیست؟",
          "نام مؤسسه یا محل کار شما چیست؟",
          "نشانی محل کار شما چیست؟",
          "شهر محل کار شما چیست؟",
          "خیابان محل کار شما چیست؟",
          "کوچه محل کار شما چیست؟",
          "پلاک محل کار شما چیست؟",
          "تلفن ثابت محل کار شما چیست؟",
          "تلفن همراه محل کار شما چیست؟"
        ]
      },
      {
        "id": "military",
        "title": "سوابق نیروهای مسلح",
        "questions": [
          "آیا سابقه اشتغال در نیروهای مسلح داشته‌اید؟",
          "شغل پیشین شما در نیروهای مسلح چه بوده است؟",
          "نوع انفصال شما از خدمت چه بوده است؟"
        ]
      },
      {
        "id": "residenceIran",
        "title": "نشانی محل سکونت در ایران",
        "questions": [
          "استان محل سکونت شما چیست؟",
          "شهر محل سکونت شما چیست؟",
          "خیابان محل سکونت شما چیست؟",
          "کوچه محل سکونت شما چیست؟",
          "پلاک محل سکونت شما چیست؟",
          "طبقه محل سکونت شما چیست؟",
          "تلفن ثابت منزل شما چیست؟",
          "تلفن همراه شما چیست؟",
          "کد پستی شما چیست؟"
        ]
      },
      {
        "id": "residenceAbroad",
        "title": "نشانی محل اقامت خارج از کشور",
        "questions": [
          "نشانی (STREET) محل اقامت خارج چیست؟",
          "شهر (CITY) محل اقامت خارج چیست؟",
          "کشور (COUNTRY) محل اقامت خارج چیست؟",
          "شماره تلفن (TELL) محل اقامت خارج چیست؟",
          "مدت اقامت شما در خارج از کشور چند سال است؟"
        ]
      },
      {
        "id": "travel",
        "title": "اطلاعات سفر",
        "questions": [
          "کشور مقصد شما چیست؟",
          "منظور از مسافرت چیست؟"
        ]
      },
      {
        "id": "previousPassport",
        "title": "اطلاعات گذرنامه قبلی",
        "questions": [
          "آیا تاکنون گذرنامه داشته‌اید؟",
          "شماره گذرنامه قبلی چیست؟",
          "تاریخ صدور گذرنامه قبلی چیست؟",
          "محل صدور گذرنامه قبلی کجاست؟",
          "تاریخ انقضای گذرنامه قبلی چیست؟",
          "علت تعویض گذرنامه چیست؟"
        ]
      },
      {
        "id": "declaration",
        "title": "تعهد متقاضی",
        "questions": [
          "آیا صحت مطالب فوق را تأیید می‌کنید؟",
          "نام شما چیست؟",
          "نام خانوادگی شما چیست؟"
        ]
      }
    ]
  };

  // کلیدها را مثل پروژه اصلی بساز: sectionId__qN
  function normalizeSchemaToForm(schema) {
    const sections = (schema.sections || []).map(sec => {
      const qs = Array.isArray(sec.questions) ? sec.questions : [];
      const fields = qs.map((q, idx) => ({
        question: q,
        key: `${sec.id}__q${idx + 1}`
      }));
      return { id: sec.id, title: sec.title, fields };
    });

    return { formTitle: schema.formTitle || "", sections };
  }

  const form = normalizeSchemaToForm(formSchema);

  // select را اتومات پر کن (9 بخش + همه سوال‌ها)
  function populateFieldSelect(selectEl) {
    selectEl.innerHTML = "";

    form.sections.forEach(sec => {
      const og = document.createElement("optgroup");
      og.label = sec.title;

      sec.fields.forEach(f => {
        const opt = document.createElement("option");
        opt.value = f.key;                         // ✅ key واقعی
        opt.textContent = `${f.key} — ${f.question}`; // خوانا
        og.appendChild(opt);
      });

      selectEl.appendChild(og);
    });
  }
  const templateUrl = "assets/forms/passport.pdf"; // ✅ PDF واقعی ریپو تو
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");

  const fieldKeyEl = document.getElementById("fieldKey");
    populateFieldSelect(fieldKeyEl);
  const fontSizeEl = document.getElementById("fontSize");
  const pageIndexEl = document.getElementById("pageIndex");
  const outEl = document.getElementById("out");
  const copyBtn = document.getElementById("copyJson");

  // نتیجه‌ها را اینجا جمع می‌کنیم
  const fieldMap = {};

  // pdf.js worker
 pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

  const loadingTask = pdfjsLib.getDocument(templateUrl);
  const pdf = await loadingTask.promise;

  // اگر PDF چند صفحه است، dropdown صفحات را خودکار پر کن
  pageIndexEl.innerHTML = "";
  for (let i = 0; i < pdf.numPages; i++) {
    const opt = document.createElement("option");
    opt.value = String(i);
    opt.textContent = String(i);
    pageIndexEl.appendChild(opt);
  }

  let page = null;
  let viewport = null;
  let scale = 1.6; // اگر لازم شد کم/زیاد کن

  async function renderPage() {
    const pageIndex = Number(pageIndexEl.value);
    page = await pdf.getPage(pageIndex + 1);
    viewport = page.getViewport({ scale });

    canvas.width = Math.floor(viewport.width);
    canvas.height = Math.floor(viewport.height);

    await page.render({ canvasContext: ctx, viewport }).promise;
  }

  pageIndexEl.addEventListener("change", renderPage);

  canvas.addEventListener("click", (e) => {
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;

    // تبدیل از مختصات canvas به واحد PDF
    // pdf x = cx / scale
    // pdf y = (canvas.height - cy) / scale  چون محور y در PDF از پایین است
    const x = +(cx / scale).toFixed(2);
    const y = +((canvas.height - cy) / scale).toFixed(2);

    const key = fieldKeyEl.value;
    const size = Number(fontSizeEl.value) || 11;
    const p = Number(pageIndexEl.value);

    fieldMap[key] = { page: p, x, y, size };

    // نشانه‌گذاری روی canvas (دایره کوچک)
    ctx.beginPath();
    ctx.arc(cx, cy, 6, 0, Math.PI * 2);
    ctx.stroke();

    outEl.textContent = JSON.stringify(fieldMap, null, 2);
  });

  copyBtn.addEventListener("click", async () => {
    const txt = JSON.stringify(fieldMap, null, 2);
    await navigator.clipboard.writeText(txt);
    alert("کپی شد");
  });

  await renderPage();
})();
</script>

</body>
</html>
