<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>فرم مرحله‌ای گذرنامه</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
@font-face{
  font-family: "Vazirmatn";
  src: url("assets/fonts/vazirmatn/Vazirmatn-Regular.woff2") format("woff2");
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}

body{
  font-family: "Vazirmatn", sans-serif;
  margin: 0;
  padding: 16px;
  padding-left: max(16px, env(safe-area-inset-left));
  padding-right: max(16px, env(safe-area-inset-right));
  background: linear-gradient(to bottom, #eef2f8 0%, #f6f8fc 60%);
  color: #0f172a;
  overflow-x: hidden;
}

.flow-wrap{
  max-width: 560px;
  margin: 0 auto;
}

/* ===== Service-like top bar ===== */
.flow-top{
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 6px 6px;
}

.flow-top--service{
  direction: ltr;
}
.flow-top--service *{
  direction: rtl;
}

.brand{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  border-radius: 18px;
  padding: 10px 12px;
  background: rgba(255,255,255,.65);
  border: 1px solid rgba(2,8,23,.08);
  box-shadow: 0 10px 24px rgba(2,8,23,.06);
}

.brand__logo{
  width: 104px;
  height: auto;
  display:block;
}

.cta-service{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  padding: 12px 18px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 800;
  color:#fff;
  background: linear-gradient(to bottom, #17335f, #0f2547);
  box-shadow: 0 10px 20px rgba(15, 37, 71, .22);
  gap: 8px;
}

/* حالت غیرفعال CTA بالا */
.cta-service[aria-disabled="true"]{
  opacity: .45;
  pointer-events: none;
}

/* تیک سبز */
.checkmark{
  color: #4caf50;
  font-size: 18px;
  line-height: 1;
}

/* ===== Head / Hero ===== */
.flow-head{
  margin: 20px 6px 10px;
}

.hero-question{
  font-size: 28px;
  line-height: 1.5;
  font-weight: 800;
  text-align: center;
  color: rgba(15,23,42,.65);
  margin: 28px 0 14px;
}

.hero-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap: 0;
}

.hero-btn{
  width: 88px;
  height: 72px;
  border-radius: 18px;
  border: 1px solid rgba(2,8,23,.10);
  background: #1f6b4a;
  color: #fff;
  font-size: 22px;
  cursor: pointer;
  margin-top: 0;
  box-shadow: 0 14px 30px rgba(2,8,23,.10);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: opacity .18s ease, transform .18s ease, filter .18s ease;
}

.hero-btn:disabled{
  opacity: .28;
  cursor: not-allowed;
  box-shadow: none;
  filter: grayscale(.2);
}

/* اتصال به input */
.hero-prev{ border-top-left-radius: 0; border-bottom-left-radius: 0; }
.hero-next{ border-top-right-radius: 0; border-bottom-right-radius: 0; }

.hero-input{
  width: min(520px, 100%);
  height: 72px;
  border-radius: 0;
  border: 1px solid rgba(2,8,23,.10);
  border-left: 0;
  border-right: 0;
  background: rgba(255,255,255,.85);
  box-shadow: 0 14px 30px rgba(2,8,23,.08);
  padding: 0 22px;
  font-size: 22px;
  font-weight: 700;
  text-align: right;
  direction: rtl;
  outline: none;
  box-sizing: border-box;
}

/* چشمک placeholder داخل مستطیل */
@keyframes blink {
  0%   { opacity: 1; }
  50%  { opacity: .35; }
  100% { opacity: 1; }
}

.hero-input::placeholder{
  color: rgba(15,23,42,.28);
  font-weight: 800;
  animation: blink 1s infinite;
}

/* اکتیو بودن مستطیل */
.hero-input:focus{
  border-color: #4caf50;
  box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.20), 0 14px 30px rgba(2,8,23,.08);
}

/* dots */
.dots{
  display:flex;
  justify-content:center;
  gap: 8px;
  margin: 14px 0 10px;
  flex-wrap: wrap;
}

.dot{
  width: 14px;
  height: 14px;
  border-radius: 999px;
  background: rgba(2,8,23,.10);
  border: 1px solid rgba(2,8,23,.10);
  box-shadow: inset 0 1px 1px rgba(255,255,255,.7);
}

.dot.is-active{
  background: rgba(76,175,80,.55);
  border-color: rgba(76,175,80,.45);
}

.dot.is-done{
  background: rgba(76,175,80,.90);
  border-color: rgba(76,175,80,.70);
}

.helper{
  text-align:center;
  font-size: 15px;
  line-height: 1.9;
  color: rgba(15,23,42,.55);
  margin-top: 8px;
}

/* Actions */
.card{
  background: #ffffff;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(2, 8, 23, .06);
  border: 1px solid rgba(2, 8, 23, .07);
  padding: 22px;
  margin: 14px 0 0;
}

.card--actions{
  margin-top: 18px;
  max-width: 560px;
}

button{
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  margin-top: 10px;
  min-height: 52px;
}

.primary{
  color: #fff;
  background: linear-gradient(to bottom, #17335f, #0f2547);
  box-shadow: 0 10px 20px rgba(15, 37, 71, .25);
}

.voice{
  background: rgba(15, 23, 42, 0.06);
  color: #0f172a;
  border: 1px solid rgba(15, 23, 42, 0.10);
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.ios-hint{
  display:none;
  margin-top: 10px;
  font-size: 13px;
  color: rgba(15, 23, 42, .60);
  line-height: 1.8;
}

.bottom-row{
  margin-top: 14px;
  display: flex;
  justify-content: space-between;
  gap: 10px;
  font-size: 13px;
  color: rgba(15, 23, 42, .60);
}
.bottom-row a{
  text-decoration: none;
  color: rgba(15, 37, 71, .95);
  opacity: .9;
}

.success-note{
  margin-top: 10px;
  font-size: 13px;
  color: rgba(15, 23, 42, .60);
}

/* Mobile */
@media (max-width: 480px){
  body{ padding: 14px; }
  .card{ padding: 20px; }

  .hero-question{ font-size: 22px; margin-top: 18px; }
  .hero-btn{ width: 72px; height: 62px; }
  .hero-input{ height: 62px; font-size: 18px; }
  .dot{ width: 12px; height: 12px; }
}
  </style>
</head>

<body>
  <div class="flow-wrap">

    <div class="flow-top flow-top--service">
      <a class="brand" href="index.html" aria-label="پلیس+۱۰ افسریه">
        <img src="assets/img/logo/logo_white.png" class="brand__logo" alt="پلیس+۱۰ افسریه">
      </a>

      <!-- CTA بالای صفحه: اول عنوان بخش را نشان می‌دهد و غیرفعال است؛ آخر فعال و دانلود می‌شود -->
      <a class="cta-service" id="topCta" href="assets/forms/passport.pdf" download aria-disabled="true">
        مشخصات هویتی
      </a>
    </div>

    <div class="flow-head">
      <div class="hero-question" id="heroQuestion">نام خود را بنویسید</div>

      <div class="hero-row">
        <button class="hero-btn hero-prev" id="prevButton" type="button" aria-label="مرحله قبل">▶</button>

        <input
          class="hero-input"
          type="text"
          id="answerInput"
          inputmode="text"
          autocomplete="off"
          autocorrect="on"
          autocapitalize="none"
          spellcheck="true"
          placeholder=""
        />

        <button class="hero-btn hero-next" id="nextButton" type="button" aria-label="مرحله بعد">◀</button>
      </div>

      <div class="dots" id="dots"></div>

      <div class="helper" id="helperText">
        پس از تکمیل مراحل، دکمه «دریافت فرم گذرنامه» فعال می‌شود.
      </div>
    </div>

    <div class="card card--actions">
      <div class="ios-hint" id="iosHint">
        در آیفون، برای ورود صوتی از میکروفونِ کیبورد استفاده کنید.
      </div>

      <button class="voice" id="voiceButton" type="button">🎤 ورود صوتی</button>

      <button class="primary" id="downloadPdfButton" type="button" style="display:none;">دریافت فرم گذرنامه</button>

      <div class="bottom-row">
        <a href="passport.html">خروج</a>
        <a href="#" onclick="location.reload(); return false;">شروع مجدد</a>
      </div>

      <div class="success-note" id="wmNote" style="display:none;">
        فایل خروجی شامل واترمارک دفتر است.
      </div>
    </div>

  </div>

  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"></script>

  <script>
document.addEventListener('DOMContentLoaded', function () {
  const form = {
    sections: [
      {
        title: "مشخصات هویتی",
        fields: [
          { question: "نام شما چیست؟", key: "firstName" },
          { question: "نام خانوادگی شما چیست؟", key: "lastName" }
        ]
      },
      {
        title: "اطلاعات ظاهری",
        fields: [
          { question: "قد شما چقدر است؟", key: "height" }
        ]
      }
    ]
  };

  const inputEl = document.getElementById("answerInput");
  const heroQuestionEl = document.getElementById("heroQuestion");
  const nextBtn = document.getElementById("nextButton");
  const prevBtn = document.getElementById("prevButton");
  const dotsEl = document.getElementById("dots");
  const voiceBtn = document.getElementById("voiceButton");
  const downloadBtn = document.getElementById("downloadPdfButton");
  const iosHint = document.getElementById("iosHint");
  const topCta = document.getElementById("topCta");

  // iOS: voice hidden + hint
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  if (isIOS) {
    voiceBtn.style.display = "none";
    iosHint.style.display = "block";
  }

  function normalizePersianNumbers(text) {
    return String(text || "")
      .replace(/[۰-۹]/g, d => "۰۱۲۳۴۵۶۷۸۹".indexOf(d))
      .replace(/[٠-٩]/g, d => "٠١٢٣٤٥٦٧٨٩".indexOf(d));
  }

  const totalSteps = form.sections.reduce((sum, s) => sum + (s.fields?.length || 0), 0);
  let currentStep = 0;
  const answers = {};

  function resolveStep(step) {
    let sectionIndex = 0;
    let fieldIndex = step;

    while (sectionIndex < form.sections.length && fieldIndex >= form.sections[sectionIndex].fields.length) {
      fieldIndex -= form.sections[sectionIndex].fields.length;
      sectionIndex++;
    }

    const section = form.sections[sectionIndex];
    const field = section.fields[fieldIndex];
    return { sectionIndex, fieldIndex, section, field };
  }

  function updateNavState() {
    prevBtn.disabled = (currentStep === 0);
    nextBtn.disabled = (inputEl.value.trim() === "");
  }

  function renderDots() {
    dotsEl.innerHTML = "";
    for (let i = 0; i < totalSteps; i++) {
      const d = document.createElement("span");
      d.className =
        "dot" +
        (i < currentStep ? " is-done" : "") +
        (i === currentStep ? " is-active" : "");
      dotsEl.appendChild(d);
    }
  }

  function setTopCtaForStep(sectionTitle) {
    // تا قبل از پایان: عنوان بخش + غیرفعال
    topCta.setAttribute("aria-disabled", "true");
    topCta.innerHTML = sectionTitle;
  }

  function setTopCtaComplete() {
    // پایان: فعال + متن دانلود + تیک سبز سمت چپ
    topCta.removeAttribute("aria-disabled");
    topCta.innerHTML = `دریافت فرم گذرنامه <span class="checkmark">✔</span>`;
  }

  function showQuestion() {
    if (currentStep < totalSteps) {
      const { section, field } = resolveStep(currentStep);

      // CTA بالا = عنوان بخش
      setTopCtaForStep(section.title);

      // سوال داخل placeholder (چشمک CSS دارد)
      heroQuestionEl.style.display = "none";
      inputEl.style.display = "block";

      inputEl.style.transition = "opacity 0.22s ease, transform 0.22s ease";
      inputEl.style.opacity = "0";
      inputEl.style.transform = "translateY(6px)";

      window.requestAnimationFrame(() => {
        inputEl.placeholder = field.question;
        inputEl.value = answers[field.key] || "";

        // نوع ورودی
        if (field.key === "height") {
          inputEl.type = "text";
          inputEl.inputMode = "decimal";
          inputEl.dir = "ltr";
        } else {
          inputEl.type = "text";
          inputEl.inputMode = "text";
          inputEl.dir = "rtl";
        }

        prevBtn.style.display = "inline-flex";
        nextBtn.style.display = "inline-flex";

        downloadBtn.style.display = "none";
        document.getElementById("wmNote").style.display = "none";

        renderDots();
        updateNavState();

        window.requestAnimationFrame(() => {
          inputEl.style.opacity = "1";
          inputEl.style.transform = "translateY(0)";
        });

        // اکتیو بودن مستطیل
        inputEl.focus();
      });

      return;
    }

    // پایان
    setTopCtaComplete();

    heroQuestionEl.style.display = "block";
    heroQuestionEl.textContent = "تمام شد ✅";

    inputEl.style.display = "none";
    prevBtn.style.display = "none";
    nextBtn.style.display = "none";
    voiceBtn.style.display = "none";

    downloadBtn.style.display = "inline-flex";
    document.getElementById("wmNote").style.display = "block";

    renderDots();
  }

  // live enable/disable next
  inputEl.addEventListener("input", updateNavState);

  // Enter فقط next
  inputEl.addEventListener("keydown", function(e){
    if (e.key === "Enter") {
      e.preventDefault();
      nextBtn.click();
    }
  });

  nextBtn.addEventListener("click", function () {
    const raw = inputEl.value.trim();
    if (!raw) return;

    const { field } = resolveStep(currentStep);
    answers[field.key] = normalizePersianNumbers(raw);

    currentStep++;
    showQuestion();
  });

  prevBtn.addEventListener("click", function () {
    if (currentStep <= 0) return;

    // ذخیره مقدار مرحله فعلی
    const { field } = resolveStep(currentStep);
    const raw = inputEl.value.trim();
    if (raw) answers[field.key] = normalizePersianNumbers(raw);

    currentStep--;
    showQuestion();
  });

  // Voice Input (Android/Windows)
  voiceBtn.addEventListener("click", function () {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      alert("این مرورگر از ورودی صوتی پشتیبانی نمی‌کند.");
      return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "fa-IR";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    voiceBtn.disabled = true;
    voiceBtn.textContent = "🎙️ در حال گوش دادن...";

    recognition.onresult = function (event) {
      const text = event.results?.[0]?.[0]?.transcript || "";
      inputEl.value = normalizePersianNumbers(text);
      updateNavState();
    };

    recognition.onerror = function (event) {
      alert("خطای ورودی صوتی: " + (event.error || "نامشخص"));
    };

    recognition.onend = function () {
      voiceBtn.disabled = false;
      voiceBtn.textContent = "🎤 ورود صوتی";
    };

    recognition.start();
  });

  // ====== PNG TEXT RENDER ======
  async function drawTextAsPngOnPdf(pdfDoc, page, text, x, y, fontSize) {
    const t = String(text ?? "").trim();
    if (!t) return;

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    const pad = Math.ceil(fontSize * 0.6);

    ctx.font = `${fontSize}px Vazirmatn`;
    ctx.direction = "rtl";
    ctx.textAlign = "right";
    ctx.textBaseline = "alphabetic";

    const m = ctx.measureText(t);
    const w = Math.ceil(m.width) + pad * 2;
    const h = Math.ceil(fontSize * 1.6) + pad * 2;

    canvas.width = w;
    canvas.height = h;

    ctx.font = `${fontSize}px Vazirmatn`;
    ctx.direction = "rtl";
    ctx.textAlign = "right";
    ctx.textBaseline = "alphabetic";

    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = "#000";
    ctx.fillText(t, w - pad, h - pad);

    const dataUrl = canvas.toDataURL("image/png");
    const pngBytes = await fetch(dataUrl).then(r => r.arrayBuffer());
    const png = await pdfDoc.embedPng(pngBytes);

    const SCALE = 0.75;
    const imgW = w * SCALE;
    const imgH = h * SCALE;

    page.drawImage(png, {
      x: x - imgW + 1,
      y: y - (fontSize * SCALE),
      width: imgW,
      height: imgH,
    });
  }
  // ====== END PNG TEXT RENDER ======

  async function generatePdf(answers) {
    const { PDFDocument } = PDFLib;

    const templateUrl = "assets/forms/passport.pdf";
    const existingPdfBytes = await fetch(templateUrl).then(r => r.arrayBuffer());
    const pdfDoc = await PDFDocument.load(existingPdfBytes);
    const page0 = pdfDoc.getPages()[0];

    await drawTextAsPngOnPdf(pdfDoc, page0, answers.firstName, 451.25, 652.5, 11);
    await drawTextAsPngOnPdf(pdfDoc, page0, answers.lastName,  372.5,  615.63, 11);
    await drawTextAsPngOnPdf(pdfDoc, page0, answers.height,    326.88, 513.13, 11);

    const pdfBytes = await pdfDoc.save();
    const blob = new Blob([pdfBytes], { type: "application/pdf" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "passport-filled.pdf";
    a.click();
    URL.revokeObjectURL(url);
  }

  downloadBtn.addEventListener("click", async function () {
    try {
      await generatePdf(answers);
    } catch (e) {
      console.error(e);
      alert("خطا در ساخت PDF");
    }
  });

  // شروع
  showQuestion();
});
  </script>
</body>
</html>
