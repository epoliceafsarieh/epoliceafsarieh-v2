<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>فرم مرحله‌ای گذرنامه</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
@font-face{
  font-family: "Vazirmatn";
  src: url("assets/fonts/vazirmatn/Vazirmatn-Regular.woff2") format("woff2");
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
body{
  font-family: "Vazirmatn", sans-serif;
  margin: 0;
  padding: 16px;
  padding-bottom: 24px;
  padding-left: max(16px, env(safe-area-inset-left));
  padding-right: max(16px, env(safe-area-inset-right));
  background: #0f2547; /* سرمه‌ای */
  overflow-x: hidden;
}

.flow-wrap{
  max-width: 520px;
  margin: 0 auto;
}

/* Header */
.flow-top{
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 6px 6px;
}

.back-link{
  display: inline-flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  padding: 8px 12px;
  border-radius: 999px;
  color: #fff;
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.18);
}
.back-link:hover{
  background: rgba(255,255,255,.16);
}

/* ===== Unified Controls ===== */
input, textarea, select{
  width: 100%;
  padding: 12px 14px;
  font-size: 16px;            /* iOS zoom نشود */
  border-radius: 14px;
  border: 1px solid rgba(15,23,42,.10);
  background: #ffffff;
  outline: none;
  text-align: right;
  direction: rtl;
  box-sizing: border-box;
  min-height: 48px;
  line-height: 1.5;
}

textarea{
  resize: none;
  overflow: hidden;
}

select{
  appearance: none;
  -webkit-appearance: none;
  background-image:
    linear-gradient(45deg, transparent 50%, rgba(15,23,42,.55) 50%),
    linear-gradient(135deg, rgba(15,23,42,.55) 50%, transparent 50%);
  background-position:
    calc(14px) calc(50% - 3px),
    calc(9px)  calc(50% - 3px);
  background-size: 6px 6px, 6px 6px;
  background-repeat: no-repeat;
  padding-left: 34px;
}

input:focus, textarea:focus, select:focus{
  border-color: rgba(245,158,11,.65);
  box-shadow: 0 0 0 4px rgba(245,158,11,.14);
}

/* Buttons (global) */
button{
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  margin-top: 10px;
  min-height: 52px;
}

.voice{
  width: 52px;
  height: 52px;
  padding: 0;
  border-radius: 999px;
  background: linear-gradient(to bottom, #17335f, #0f2547);
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 10px auto 0;
}

/* iOS hint */
.ios-hint{
  display:none;
  margin-top: 10px;
  font-size: 13px;
  color: rgba(15, 23, 42, .60);
  line-height: 1.8;
}

/* Preview bar */
.preview-bar{
  position: static;
  width: 100%;
  border: none;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 16px 18px;
  background: linear-gradient(to bottom, #17335f, #0f2547);
  color: #fff;
  box-shadow: 0 14px 26px rgba(2,8,23,.14);
}

.preview-bar__title{ font-size: 14px; font-weight: 800; }
.preview-bar__cta{ font-size: 14px; font-weight: 900; opacity: .95; }

.preview-bar:disabled{
  opacity: .55;
  cursor: not-allowed;
}

/* Bottom links */
.bottom-row{
  margin-top: 8px;
  display: flex;
  justify-content: space-between;
  gap: 10px;
  font-size: 13px;
  color: rgba(15, 23, 42, .60);
}
.bottom-row a{
  text-decoration: none;
  color: rgba(15, 37, 71, .95);
  opacity: .9;
    padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid rgba(15,37,71,.18);
  background: rgba(15,23,42,.04);
  font-weight: 800;
}

.success-note{
  margin-top: 10px;
  font-size: 13px;
  color: rgba(15, 23, 42, .60);
}

/* ===== Service-like top bar ===== */
.flow-top--service{
  padding: 14px 6px 6px;
  direction: ltr;
}
.flow-top--service *{
  direction: rtl;
}

/* ===== Wizard shell ===== */
.flow-head--compact{
  margin: 20px 6px 10px;
}
.wizard-intro{
  padding: 14px 14px 10px;
  border-bottom: 1px solid rgba(2,8,23,.08);
  background: rgba(255,255,255,.92);
}
.wizard-intro__title{
  font-size: 20px;
  font-weight: 800;
  color: rgba(15,23,42,.92);
  line-height: 1.25;
}
.wizard-intro__desc{
  margin-top: 6px;
  font-size: 13px;
  font-weight: 500;
  color: rgba(15,23,42,.70);
  line-height: 1.7;
}
  .wizard-intro__trust{
  margin-top: 6px;
  font-size: 12px;
  font-weight: 700;
  color: rgba(15,23,42,.60);
}  
.wizard-shell{
  width: min(520px, 100%);
  margin: 0 auto;
  border-radius: 22px;
  border: 1px solid rgba(2,8,23,.10);
  background: rgba(255,255,255,.92);
  border-radius: 22px;
  isolation: isolate;
  box-shadow: 0 14px 30px rgba(2,8,23,.08);
  overflow: visible;
}

/* Top progress (global) */
.progress-top{
  flex: 1;
  display:flex;
  flex-direction: column;
  gap: 6px;
  min-width: 0;
}
.progress-top__bar{
  height: 10px;
  border-radius: 6px;
  background: rgba(15,23,42,.12);
  overflow: hidden;
}
.progress-top__fill{
  height: 100%;
  width: 0%;
  background: #0f2547;
  border-radius: 4px;
  transition: width .18s ease;
}
.progress-top__text{
  font-size: 12px;
  font-weight: 800;
  color: rgba(15,23,42,.70);
  white-space: nowrap;
}

.wizard-nav{
  display:flex;
  align-items:center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 12px 12px;
  background: rgba(255,255,255,.92);
  z-index: 20;
  border-bottom: 1px solid rgba(2,8,23,.08);

  position: sticky;
  top: 0;
  backdrop-filter: blur(8px);
}
@media (max-width: 480px){
  .wizard-nav{
    position: sticky;
    top: 0;
    backdrop-filter: blur(8px);

    /* موبایل: جلوگیری از تداخل */
    flex-wrap: wrap;
    gap: 8px;
    align-items: flex-start;
  }

 @media (max-width: 700px){
  .wizard-nav{
    flex-wrap: wrap;
    gap: 8px;
    align-items: flex-start;
  }
 @media (max-width: 700px){
  .wizard-nav{
    flex-wrap: wrap;
    gap: 8px;
    align-items: flex-start;
  }

  .progress-top{
    flex: 1 1 100%;
    order: 1;
  }

  .section-steps--nav{
    flex: 1 1 100%;
    order: 2;
    width: 100%;
    margin: 0;
  }

  .voice--inline{
    order: 3;
    margin-right: auto;
  }
}

.voice--inline{
  width: 52px;
  height: 52px;
  margin: 0;
  border-radius: 999px;
  border: 1px solid rgba(2,8,23,.10);
  box-shadow: 0 12px 22px rgba(2,8,23,.14);
  padding: 0;
  background: linear-gradient(to bottom, #17335f, #0f2547);
  color: #fff;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.wizard-body{
  padding: 14px 14px 16px;
}
.wizard-title{ display: none; }

.wizard-fields{
  display:flex;
  flex-direction: column;
  gap: 18px;
}

/* Footer nav buttons */
.wizard-footer{
  display:flex;
  gap: 10px;
  padding: 12px 14px calc(16px + env(safe-area-inset-bottom));
  background: rgba(255,255,255,.92);
  border-top: 1px solid rgba(2,8,23,.08);
}
 /* داخل کارت: پیش‌نمایش موقت (فقط مراحل 1-3) */
.wizard-preview{
  padding: 10px 14px calc(12px + env(safe-area-inset-bottom));
  background: rgba(255,255,255,.92);
  border-top: 1px solid rgba(2,8,23,.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.preview-mini{
  width: auto;
  margin-top: 0;
  min-height: 44px;
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid rgba(2,8,23,.14);
  background: rgba(15,23,42,.06);
  color: rgba(15,23,42,.88);
  font-weight: 800;
  cursor: pointer;
}
.preview-mini:active{ transform: translateY(1px); }
.preview-mini__hint{
  font-size: 12px;
  font-weight: 700;
  color: rgba(15,23,42,.62);
  white-space: nowrap;
}  
.preview-mini__hint:empty{ display:none; }
.nav-btn{
  width: 100%;
  margin-top: 0;
  min-height: 48px;
  border-radius: 14px;
  font-weight: 900;
  font-size: 14px;
}
.nav-btn--ghost{
  background: rgba(15,37,71,.10);
  border: 1px solid rgba(15,37,71,.22);
  color: rgba(15,37,71,.92);
}
.nav-btn--ghost:hover{
  background: rgba(15,37,71,.14);
}
.nav-btn--primary{
  background: #0f2547;
  color:#fff;
  box-shadow: 0 8px 18px rgba(15,37,71,.25);
  font-weight: 800;
}
.nav-btn--primary:hover{
  background: #0c1e39;
}
.nav-btn:disabled{
  opacity: .55;
  cursor: not-allowed;
}

/* Section pills */
.section-steps::-webkit-scrollbar{ display:none; }
.section-steps{
  display: flex;
  gap: 8px;
  width: min(520px, 100%);
  margin: 0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 2px;
}
.section-pill{
  flex: 0 0 auto;
}
@media (min-width: 700px){
  .section-steps{
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    overflow: visible;
    width: 100%;
  }

  .section-pill{
    width: 100%;
    justify-content: center;
    min-height: 44px;
    padding: 10px 12px;
    white-space: normal;      /* اجازه چندخطی */
    line-height: 1.2;
  }

  .section-pill .pill-title{
    font-size: 12px;
  }
}
.section-steps--nav{
  flex: 1;
  width: min(420px, 100%);
  margin: 0 auto;
}
.section-pill{
  display:inline-flex;
  align-items:center;
  gap: 8px;
  justify-content: space-between;
  min-height: 36px;
  padding: 8px 10px;
  font-size: 12px;
  white-space: nowrap;
  border-radius:12px;
  line-height: 1;
  background: rgba(15,23,42,.06);
  color: rgba(15,23,42,.75);
  border: 1px solid rgba(15,23,42,.14);
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  outline: none;
  font-family: inherit;
  width: auto;
  margin-top: 0;
}
  @media (max-width: 480px){
  .section-pill{
    min-height: 38px;
    padding: 8px 12px;
    font-size: 11px;
  }
  .section-pill .pill-title{
    font-weight: 900;
  }
}  
.section-pill.is-locked{
  opacity: .45;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}
.section-pill.is-empty{
  background: rgba(15,23,42,.06);
  border-color: rgba(15,23,42,.14);
  color: rgba(15,23,42,.74);
}
.section-pill.is-warn{
  background: rgba(15,23,42,.06);
  border-color: rgba(15,23,42,.18);
  color: rgba(15,23,42,.82);
}
.section-pill.is-done{
  background: rgba(15,37,71,.10);
  border-color: rgba(15,37,71,.24);
  color: rgba(15,23,42,.92);
}
.section-pill.is-active{
  font-weight: 900;
  border: 2px solid rgba(15,23,42,.28);
  background: rgba(15,23,42,.04);
  box-shadow: 0 12px 20px rgba(2,8,23,.12);
  transform: translateY(-1px);
}
.section-pill .pill-title{ font-weight: 800; }
.section-pill .pill-meta{
  font-weight: 900;
  font-size: 11px;
  color: rgba(15,23,42,.72);
  background: rgba(15,23,42,.06);
  border: 1px solid rgba(15,23,42,.12);
  padding: 4px 8px;
  border-radius: 999px;
  line-height: 1;
}
.section-pill .tick{
  font-size: 12px;
  color: #1f6b4a;
  line-height: 1;
}

/* Fields */
.field{
  position: relative;
  display:flex;
  flex-direction: column;
  gap: 6px;
}
 .field.is-error input,
.field.is-error textarea,
.field.is-error select{
  border-color: rgba(185,28,28,.55) !important;
  box-shadow: 0 0 0 4px rgba(185,28,28,.10) !important;
}
.field-error{
  font-size: 12px;
  font-weight: 700;
  color: rgba(185,28,28,.92);
  margin-top: 6px;
}
.req-star{
  font-size: 12px;
  font-weight: 900;
  color: rgba(185,28,28,.85);
  transform: translateY(-1px);
}   

.field-label{
  font-size: 14px;
  font-weight: 700;
  color: rgba(15,23,42,.86);
  display: inline-flex;
  align-items: baseline;
  gap: 6px;
  margin-bottom: 0;
}
.field-label::before{
  content: "";
  display: none;
}

.field-control{
  position: relative;
  overflow: hidden;
  border-radius: 14px;
}

/* Floating example */
.field-example{
  position: absolute;
  right: 12px;
  top: 18px;
  font-size: 11px;
  font-weight: 700;
  color: rgba(15,23,42,.18);
  opacity: .90;
  pointer-events: none;
  max-width: calc(100% - 24px);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: top .14s ease, font-size .14s ease, opacity .14s ease;
}
.field.has-value .field-example,
.field:focus-within .field-example{
  top: 8px;
  font-size: 8.5px;
  opacity: .55;
  color: rgba(15,23,42,.22);
}
.field-control.is-textarea .field-example{ top: 16px; }
.field.has-value .field-control.is-textarea .field-example,
.field:focus-within .field-control.is-textarea .field-example{ top: 8px; }
 .field-voice{
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 34px;
  height: 34px;
  border-radius: 10px;
  border: 1px solid rgba(2,8,23,.12);
  background: rgba(15,23,42,.06);
  color: rgba(15,23,42,.82);
  font-size: 16px;
  display: none; /* فقط روی فیلد فعال */
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.field-control{ position: relative; }
.field-control.has-voice input,
.field-control.has-voice textarea{
  padding-left: 54px; /* جا برای میکروفون */
}   

/* Choice buttons */
.choice-row{
  display:flex;
  flex-wrap: wrap;
  gap: 8px;
  overflow: hidden;
}
.choice-row::-webkit-scrollbar{ display:none; }

.choice-btn{
  width: auto !important;
  min-height: 0 !important;
  margin-top: 0 !important;
  padding: 0 12px !important;
  height: 36px;
  font-size: 13px;
  white-space: nowrap;
  border-radius: 14px !important;
  border: 1px solid rgba(2,8,23,.16);
  background: rgba(255,255,255,.95);
  color: #0f2547;
  font-family: inherit;
  font-weight: 800;
  cursor: pointer;
}
.choice-btn.is-selected{
  border-color: rgba(15,37,71,.70);
  background: rgba(15,37,71,.12);
}
.choice-btn.is-selected.is-yes{
  border-color: rgba(31,107,74,.70);
  background: rgba(31,107,74,.12);
}
.choice-btn.is-selected.is-no{
  border-color: rgba(185,28,28,.70);
  background: rgba(185,28,28,.10);
}

/* Inline Yes/No */
.field--yn{
  flex-direction: row;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.field--yn .field-label{
  margin: 0;
  flex: 1 1 auto;
  min-width: 0;
  white-space: nowrap;
}
.field--yn .choice-row{
  flex: 0 0 auto;
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  flex-wrap: nowrap;
}
.field--yn .choice-btn{
  height: 34px;
  font-size: 13px;
}

/* Group (collapsible) */
.field-group{
  border-radius: 14px;
  border: 1px solid rgba(2,8,23,.12);
  background: #f8fafc;
  overflow: hidden;
}
.field-group__head{
  width: 100%;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px 14px;
  cursor: pointer;
  background: transparent;
  border: none;
  font-family: inherit;
}
  .fg-sub{
  display:block;
  margin-top: 6px;
  font-size: 12px;
  font-weight: 700;
  color: rgba(15,23,42,.56);
}
.fg-status{
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  font-weight: 900;
  color: rgba(31,107,74,.92);
}  
.field-group__head .fg-title{
  width: 100%;
  text-align: center;
  padding: 0 34px;
  font-weight: 900;
  font-size: 14px;
  color: rgba(15,23,42,.85);
}
.field-group__head .fg-chev{
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  font-weight: 900;
  opacity: .85;
}
.field-group__body{
  padding: 12px 12px 14px;
  display: none;
  background: rgba(15,23,42,.03);
  border-top: 1px solid rgba(2,8,23,.08);
}
.field-group.is-open .field-group__body{ display: block; }
/* Actions card minimal */
.card--actions{
  margin-top: 18px;
  max-width: 560px;
  background: transparent;
  border: none;
  box-shadow: none;
  padding: 0;
}

.bottom-row--single{ justify-content: center; }

@media (max-width: 480px){
  body{ padding: 14px; }
  .wizard-shell{ width: 86vw; margin: 0 auto; }
  .preview-bar--inline{ width: 86vw; }
  .choice-row .choice-btn{
    height: 34px;
    font-size: 12px;
    padding: 0 10px !important;
  }
}
@media (min-width: 700px){
  .wizard-shell{
    width: min(620px, 100%);
  }

  .wizard-body{
    padding: 20px 22px 22px;
  }

  .voice--inline{
    width: 50px;
    height: 50px;
  }
}
  </style>
</head>

 </div>

  <script src="https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"></script>

  <script>
document.addEventListener("DOMContentLoaded", function () {
  // ===== DEV MODE (for testing) =====
  // فعال با ?dev=1
  const DEV_MODE = new URLSearchParams(location.search).get("dev") === "1";

  // ===== Wizard Schema =====
  const wizardSchema = {
    formTitle: "پرسشنامه درخواست صدور گذرنامه",
    pages: [
      {
        id: "p1_identity",
        title: "هویت فردی",
        fields: [
          { key: "identity__fullName", label: "نام و نام خانوادگی" },
          { key: "identity__nationalId", label: "کد ملی", inputMode: "numeric", dir: "ltr" },
          { key: "identity__birthDateShamsi", label: "تاریخ تولد (شمسی)", placeholder: "مثال: ۱۳۷۲/۰۵/۲۱", inputMode: "numeric", dir: "ltr" },
          { key: "identity__birthPlace", label: "محل تولد" },
          { key: "identity__fatherName", label: "نام پدر" },

          { key: "identity__statusBlock", label: "وضعیت فردی", placeholder: "مثال: مرد | متأهل | اسلام" },

          { key: "identity__hasPrevName", label: "آیا قبلاً تغییر نام داشته‌اید؟", type: "choice", choices: ["بله","خیر"] },
          {
            key: "identity__prevName",
            label: "اگر بله: نام قبلی",
            placeholder: "مثال: نام و نام خانوادگی قبلی",
            when: { key: "identity__hasPrevName", equals: "بله" }
          },

          {
            type: "group",
            key: "identity__idCardGroup",
            label: "مشخصات شناسنامه",
            fields: [
              { key: "identity__idNumber", label: "شماره شناسنامه", inputMode: "numeric", dir: "ltr" },
              { key: "identity__idIssuePlace", label: "محل صدور شناسنامه" },
              { key: "identity__idIssueDate", label: "تاریخ صدور شناسنامه", inputMode: "numeric", dir: "ltr" },
              { key: "identity__idSerialCombo", label: "سری و سریال شناسنامه" }
            ]
          },

          {
            type: "group",
            key: "identity__educationGroup",
            label: "تحصیلات",
            fields: [
              {
                key: "identity__educationLevel",
                label: "مقطع تحصیلی",
                type: "choice",
                choices: ["زیر دیپلم","دیپلم","فوق‌دیپلم","کارشناسی","کارشناسی ارشد","دکتری","سایر"]
              },
              {
                key: "identity__educationOther",
                label: "توضیح تحصیلات",
                when: { key: "identity__educationLevel", equals: "سایر" }
              },
              {
                key: "identity__major",
                label: "رشته",
                when: { key: "identity__educationLevel", in: ["فوق‌دیپلم","کارشناسی","کارشناسی ارشد","دکتری"] }
              }
            ]
          }
        ]
      },

      {
        id: "p2_personal_job",
        title: "فعالیت شغلی",
        fields: [
          { key: "physical__heightCm", label: "قد (سانتی‌متر)", inputMode: "numeric", dir: "ltr" },
          { key: "physical__weightKg", label: "وزن (کیلوگرم)", inputMode: "numeric", dir: "ltr" },
          { key: "physical__marksShort", label: "علائم ممیزه", placeholder: "مثال: جای زخم گونه چپ", optional: true },

          {
            key: "job__block",
            label: "اطلاعات شغلی",
            placeholder: "مثال: کارمند | شرکت X | تهران، ...",
            multiline: true
          },

          { key: "military__has", label: "سابقه نیروهای مسلح داشته‌اید؟", type: "choice", choices: ["بله","خیر"] },
          {
            key: "military__detailBlock",
            label: "جزئیات سابقه",
            placeholder: "مثال: راننده | پایان خدمت",
            when: { key: "military__has", equals: "بله" },
            multiline: true
          },

          {
            type: "group",
            key: "physical__colorsGroup",
            label: "رنگ چهره و چشم",
            fields: [
              { key: "physical__faceColor", label: "رنگ چهره", type: "choice", choices: ["سفید","گندمگون","سبزه","تیره","سایر"] },
              { key: "physical__eyeColor",  label: "رنگ چشم",  type: "choice", choices: ["مشکی","قهوه‌ای","عسلی","آبی","سبز","میشی","سایر"] }
            ]
          }
        ]
      },

      {
        id: "p3_address",
        title: "نشانی اقامت",
        fields: [
          { key: "residenceIran__addressFull", label: "نشانی کامل محل سکونت در ایران", multiline: true },
          { key: "residenceIran__postalCode", label: "کد پستی", inputMode: "numeric", dir: "ltr" },
          { key: "residenceIran__phoneMobile", label: "تلفن همراه", inputMode: "numeric", dir: "ltr" },

          { key: "residenceAbroad__has", label: "اقامت خارج از کشور دارید؟", type: "choice", choices: ["بله","خیر"] },

          {
            key: "residenceAbroad__addressFull",
            label: "اگر بله: نشانی محل اقامت خارج",
            placeholder: "Example: Street... City...",
            when: { key: "residenceAbroad__has", equals: "بله" },
            multiline: true,
            dir: "ltr"
          },
          {
            key: "residenceAbroad__phone",
            label: "اگر بله: تلفن خارج از کشور",
            placeholder: "Example: +49...",
            when: { key: "residenceAbroad__has", equals: "بله" },
            dir: "ltr"
          },
          {
            key: "residenceAbroad__years",
            label: "اگر بله: مدت اقامت (سال)",
            placeholder: "مثال: 3",
            when: { key: "residenceAbroad__has", equals: "بله" },
            inputMode: "numeric",
            dir: "ltr"
          }
        ]
      },

      {
        id: "p4_travel_extra",
        title: "سفر و تکمیلی",
        fields: [
          { key: "travel__country", label: "کشور مقصد" },
          { key: "travel__purpose", label: "منظور از سفر" },

          { key: "rel1__block", label: "بستگان ۱", placeholder: "مثال: علی رضایی | آزاد | تهران... | 0912...", multiline: true },
          { key: "rel2__block", label: "بستگان ۲", placeholder: "مثال: مریم محمدی | کارمند | تهران... | 0912...", multiline: true },

          {
            type: "group",
            key: "previousPassport__group",
            label: "اطلاعات گذرنامه قبلی",
            fields: [
              { key: "previousPassport__has", label: "قبلاً گذرنامه داشته‌اید؟", type: "choice", choices: ["بله","خیر"] },
              { key: "previousPassport__number", label: "شماره گذرنامه قبلی", when: { key: "previousPassport__has", equals: "بله" }, dir: "ltr" },
              { key: "previousPassport__issueDate", label: "تاریخ صدور", when: { key: "previousPassport__has", equals: "بله" }, inputMode: "numeric", dir: "ltr" },
              { key: "previousPassport__issuePlace", label: "محل صدور", when: { key: "previousPassport__has", equals: "بله" } },
              { key: "previousPassport__expireDate", label: "تاریخ انقضا", when: { key: "previousPassport__has", equals: "بله" }, inputMode: "numeric", dir: "ltr" },
              { key: "previousPassport__replaceReason", label: "توضیح", when: { key: "previousPassport__has", equals: "بله" } }
            ]
          }
        ]
      }
    ]
  };

  // ===== DOM refs =====
  const iosHint = document.getElementById("iosHint");
  const sectionStepsEl = document.getElementById("sectionSteps");
  const bottomPreviewBar = document.getElementById("bottomPreviewBar");
  const bottomPreviewCta = document.getElementById("bottomPreviewCta");
  const topProgressFill = document.getElementById("topProgressFill");
  const topProgressText = document.getElementById("topProgressText");

  const prevStepBtn = document.getElementById("prevStepBtn");
  const nextStepBtn = document.getElementById("nextStepBtn");

  const wizardTitleEl = document.getElementById("wizardTitle");
  const wizardFieldsEl = document.getElementById("wizardFields");

  const wmNote = document.getElementById("wmNote");
  const wizardPreview = document.getElementById("wizardPreview");
  // iOS: voice hidden + hint
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  if (isIOS) {
       iosHint.style.display = "block";
  }

  const answers = {};
  let lastFocusedKey = "";
  let currentPage = 0;

  wizardFieldsEl.addEventListener("focusin", (e) => {
    const el = e.target;
    const k = el && el.getAttribute && el.getAttribute("data-key");
    if (k) lastFocusedKey = k;
        // نمایش میکروفون فقط برای همین فیلد
    wizardFieldsEl.querySelectorAll(".field-voice").forEach(btn => btn.style.display = "none");
    const wrap = el && el.closest ? el.closest(".field-control") : null;
    if (wrap) {
      const vb = wrap.querySelector(".field-voice");
      if (vb) vb.style.display = "inline-flex";
    }
  });

  function normalizePersianNumbers(text) {
    return String(text || "")
      .replace(/[۰-۹]/g, d => "۰۱۲۳۴۵۶۷۸۹".indexOf(d))
      .replace(/[٠-٩]/g, d => "٠١٢٣٤٥٦٧٨٩".indexOf(d));
  }
    function startVoiceForKey(key, onDone){
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      alert("این مرورگر از ورودی صوتی پشتیبانی نمی‌کند.");
      return;
    }
    const recognition = new SpeechRecognition();
    recognition.lang = "fa-IR";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onresult = function (event) {
      const text = event.results?.[0]?.[0]?.transcript || "";
      answers[key] = normalizePersianNumbers(text);
      if (typeof onDone === "function") onDone(answers[key]);
      updateNav();
      renderPage({ preserveFocusKey: key });
    };

    recognition.onerror = function (event) {
      alert("خطای ورودی صوتی: " + (event.error || "نامشخص"));
    };

    recognition.start();
  }

  function shouldShowField(field) {
    const w = field.when;
    if (!w) return true;
    const v = (answers[w.key] || "").trim();
    if (typeof w.equals !== "undefined") return v === w.equals;
    if (Array.isArray(w.in)) return w.in.includes(v);
    return true;
  }

  function getVisibleFields(page) {
    return (page.fields || []).filter(shouldShowField);
  }

  function isGroupField(f){
    return !!(f && f.type === "group" && Array.isArray(f.fields));
  }

  // leaf fields برای completion/progress
  function getVisibleLeafFields(page){
    const out = [];
    (page.fields || []).forEach(f => {
      if (!shouldShowField(f)) return;
      if (isGroupField(f)) {
        (f.fields || []).forEach(ch => {
          if (shouldShowField(ch)) out.push(ch);
        });
        return;
      }
      out.push(f);
    });
    return out;
  }

  function isConditionalDriverKey(key) {
    return [
      "identity__educationLevel",
      "identity__hasPrevName",
      "military__has",
      "residenceAbroad__has",
      "previousPassport__has"
    ].includes(String(key || ""));
  }

  function clearDependentFields(driverKey, driverValue) {
    const k = String(driverKey || "").trim();
    const v = String(driverValue || "").trim();

    if (k === "identity__educationLevel") {
      const uniLevels = ["فوق‌دیپلم","کارشناسی","کارشناسی ارشد","دکتری"];
      if (!uniLevels.includes(v)) answers["identity__major"] = "";
      if (v !== "سایر") answers["identity__educationOther"] = "";
      return;
    }

    if (k === "identity__hasPrevName" && v !== "بله") {
      answers["identity__prevName"] = "";
      return;
    }

    if (k === "military__has" && v !== "بله") {
      answers["military__detailBlock"] = "";
      return;
    }

    if (k === "residenceAbroad__has" && v !== "بله") {
      answers["residenceAbroad__addressFull"] = "";
      answers["residenceAbroad__phone"] = "";
      answers["residenceAbroad__years"] = "";
      return;
    }

    if (k === "previousPassport__has" && v !== "بله") {
      answers["previousPassport__number"] = "";
      answers["previousPassport__issueDate"] = "";
      answers["previousPassport__issuePlace"] = "";
      answers["previousPassport__expireDate"] = "";
      answers["previousPassport__replaceReason"] = "";
      return;
    }
  }

  function isFieldFilled(key) {
    return ((answers[key] || "").trim() !== "");
  }
    function clearAllFieldErrors(){
    wizardFieldsEl.querySelectorAll(".field.is-error").forEach(el => el.classList.remove("is-error"));
    wizardFieldsEl.querySelectorAll(".field-error").forEach(el => el.remove());
  }

  function showFieldError(key, msg){
    const input = wizardFieldsEl.querySelector(`[data-key="${key}"]`);
    if (!input) return;
    const fieldWrap = input.closest(".field");
    if (!fieldWrap) return;

    fieldWrap.classList.add("is-error");

    // اگر قبلاً خطا دارد، دوباره نساز
    if (fieldWrap.querySelector(".field-error")) return;

    const e = document.createElement("div");
    e.className = "field-error";
    e.textContent = msg || "این مورد الزامی است.";
    fieldWrap.appendChild(e);
  }

  function scrollToField(key){
    const input = wizardFieldsEl.querySelector(`[data-key="${key}"]`);
    if (!input) return;
    input.scrollIntoView({ behavior: "smooth", block: "center" });
    try { input.focus(); } catch(e) {}
  }

  function isPageComplete(page) {
    if (DEV_MODE) return true;
    const leaf = getVisibleLeafFields(page);
    return leaf.every(f => (f.optional ? true : isFieldFilled(f.key)));
  }

  function isAllComplete() {
    if (DEV_MODE) return true;
    return wizardSchema.pages.every(p => isPageComplete(p));
  }

  function renderPills() {
    if (!sectionStepsEl) return;
    sectionStepsEl.innerHTML = "";

    // unlocked index: تا اولین صفحه ناقص
    let unlocked = 0;
    while (unlocked < wizardSchema.pages.length && isPageComplete(wizardSchema.pages[unlocked])) unlocked++;

    wizardSchema.pages.forEach((p, idx) => {
      const leaf = getVisibleLeafFields(p);
      const pageDone = isPageComplete(p);
      const anyAnswered = leaf.some(f => isFieldFilled(f.key));

      const pill = document.createElement("button");
      const stateClass = pageDone ? " is-done" : (anyAnswered ? " is-warn" : " is-empty");

      const isLocked = DEV_MODE ? false : (idx > unlocked);
      pill.className = "section-pill" + (idx === currentPage ? " is-active" : "") + stateClass + (isLocked ? " is-locked" : "");
      pill.disabled = isLocked;
      pill.type = "button";

      const required = leaf.filter(f => !f.optional);
      const answered = required.filter(f => isFieldFilled(f.key)).length;

      const titleSpan = document.createElement("span");
      titleSpan.className = "pill-title";
      titleSpan.textContent = `(${idx + 1}) ${p.title}`;

      pill.appendChild(titleSpan);

      if (pageDone) {
        const tick = document.createElement("span");
        tick.className = "tick";
        tick.textContent = "✔";
        pill.appendChild(tick);
      }

      pill.addEventListener("click", () => {
        if (pill.disabled) return;
        currentPage = idx;
        renderPage();
      });

      sectionStepsEl.appendChild(pill);
    });
  }

  function buildSelectField(field) {
    const wrap = document.createElement("div");
    wrap.className = "field";

    const label = document.createElement("div");
    label.className = "field-label";
    label.textContent = (field.label || field.key);
       if (!field.optional) {
      const star = document.createElement("span");
      star.className = "req-star";
      star.textContent = "*";
      label.appendChild(star);
    }
    const control = document.createElement("div");
    control.className = "field-control";

    const sel = document.createElement("select");
    sel.setAttribute("data-key", field.key);

    const ph = document.createElement("option");
    ph.value = "";
    ph.textContent = "انتخاب کنید";
    sel.appendChild(ph);

    const currentVal = (answers[field.key] || "").trim();
    (field.choices || []).forEach(ch => {
      const opt = document.createElement("option");
      opt.value = ch;
      opt.textContent = ch;
      if (currentVal === ch) opt.selected = true;
      sel.appendChild(opt);
    });

    sel.addEventListener("change", (e) => {
      answers[field.key] = String(e.target.value || "");
      clearDependentFields(field.key, answers[field.key]);
      updateNav();

      if (isConditionalDriverKey(field.key)) {
        try { sel.blur(); } catch(e) {}
        setTimeout(() => { renderPage(); }, 0);
      }
    });

    control.appendChild(sel);
    wrap.appendChild(label);
    wrap.appendChild(control);
    return wrap;
  }

  function buildTextField(field) {
    const wrap = document.createElement("div");
    wrap.className = "field";

    const label = document.createElement("div");
    label.className = "field-label";
       label.textContent = (field.label || field.key);
    if (!field.optional) {
      const star = document.createElement("span");
      star.className = "req-star";
      star.textContent = "*";
      label.appendChild(star);
    }
    

    let input;
    const isTextarea = !!field.multiline;

    if (isTextarea) {
      input = document.createElement("textarea");
      input.rows = 1;
    } else {
      input = document.createElement("input");
      input.type = "text";
    }

    input.value = answers[field.key] || "";
    input.setAttribute("data-key", field.key);
    input.inputMode = field.inputMode || "text";
    input.dir = field.dir ? field.dir : "rtl";
    input.placeholder = "";

    const control = document.createElement("div");
    control.className = "field-control";
    if (isTextarea) control.classList.add("is-textarea");

    if (field.placeholder) {
      const ex = document.createElement("div");
      ex.className = "field-example";
      ex.textContent = String(field.placeholder);
      control.appendChild(ex);
    }
    // میکروفون فقط در غیر iOS
    if (!isIOS) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SpeechRecognition) {
        control.classList.add("has-voice");

        const vb = document.createElement("button");
        vb.type = "button";
        vb.className = "field-voice";
        vb.textContent = "🎤";
        vb.setAttribute("data-voice-for", field.key);

        vb.addEventListener("click", () => {
          startVoiceForKey(field.key, (val) => {
            input.value = val;
          });
        });

        control.appendChild(vb);
      }
    }
    control.appendChild(input);

    function syncHasValue() {
      wrap.classList.toggle("has-value", String(input.value || "").trim() !== "");
    }

    function autoGrow() {
      if (!isTextarea) return;
      input.style.height = "auto";
      input.style.height = (input.scrollHeight) + "px";
    }

    // init
    syncHasValue();
    autoGrow();

    input.addEventListener("input", (e) => {
      const wrap = input.closest(".field");
      if (wrap) wrap.classList.remove("is-error");
      const err = wrap ? wrap.querySelector(".field-error") : null;
      if (err) err.remove();
      answers[field.key] = normalizePersianNumbers(e.target.value || "");
      syncHasValue();
      autoGrow();
      updateNav();

      if (isConditionalDriverKey(field.key)) {
        renderPage({ preserveFocusKey: field.key });
      }
    });

    wrap.appendChild(label);
    wrap.appendChild(control);
    return wrap;
  }

  function buildGroupField(groupField) {
    const wrap = document.createElement("div");
    wrap.className = "field";

    const box = document.createElement("div");
    box.className = "field-group";

    const head = document.createElement("button");
    head.type = "button";
    head.className = "field-group__head";

    const t = document.createElement("span");
    t.className = "fg-title";
       t.textContent = (groupField.label ? `${groupField.label}` : "گروه");

    const chev = document.createElement("span");
    chev.className = "fg-chev";
    chev.textContent = "+";
    // میکروکپی
   
    head.appendChild(t);
    head.appendChild(chev);
    const status = document.createElement("span");
    status.className = "fg-status";
    status.textContent = "";
    head.appendChild(status);
    const body = document.createElement("div");
    body.className = "field-group__body";

    const uiKey = `__ui_open__${groupField.key}`;
    const isOpen = (answers[uiKey] === "1");
    if (isOpen) { box.classList.add("is-open"); chev.textContent = "−"; }

    head.addEventListener("click", () => {
      const nowOpen = !box.classList.contains("is-open");
      box.classList.toggle("is-open", nowOpen);
      chev.textContent = nowOpen ? "−" : "+";
      answers[uiKey] = nowOpen ? "1" : "0";
    });

    (groupField.fields || []).forEach(f => {
      if (!shouldShowField(f)) return;
      if (f.type === "choice") body.appendChild(buildChoiceField(f));
      else body.appendChild(buildTextField(f));
    });

    box.appendChild(head);
    box.appendChild(body);

    wrap.appendChild(box);
        // وضعیت تکمیل گروه: اگر همه فیلدهای لازمِ قابل‌نمایش پر است
    const groupLeaf = (groupField.fields || []).filter(ch => shouldShowField(ch) && !ch.optional);
    const groupDone = groupLeaf.length > 0 && groupLeaf.every(ch => isFieldFilled(ch.key));
    status.textContent = groupDone ? "✔" : "";
    return wrap;
  }

  function buildChoiceField(field) {
    const wrap = document.createElement("div");
    wrap.className = "field";

    const isYesNo = Array.isArray(field.choices) &&
      field.choices.length === 2 &&
      field.choices.includes("بله") &&
      field.choices.includes("خیر");

    if (isYesNo) wrap.classList.add("field--yn");

    const label = document.createElement("div");
    label.className = "field-label";
          label.textContent = (field.label || field.key);
    if (!field.optional) {
      const star = document.createElement("span");
      star.className = "req-star";
      star.textContent = "*";
      label.appendChild(star);
    }

    const row = document.createElement("div");
    row.className = "choice-row";

    const currentVal = (answers[field.key] || "").trim();

    (field.choices || []).forEach(ch => {
      const b = document.createElement("button");
      b.type = "button";
      b.className = "choice-btn" + (currentVal === ch ? " is-selected" : "");
      b.textContent = ch;

      if (currentVal === ch) {
        if (ch === "بله") b.classList.add("is-yes");
        if (ch === "خیر") b.classList.add("is-no");
      }

      b.addEventListener("click", () => {
        answers[field.key] = ch;
        clearDependentFields(field.key, ch);
        updateNav();
        renderPage();
      });

      row.appendChild(b);
    });

    wrap.appendChild(label);
    wrap.appendChild(row);
    return wrap;
  }

  function renderPage(opts) {
    const page = wizardSchema.pages[currentPage];
    const visible = getVisibleFields(page);

    wizardTitleEl.textContent = page.title;
    wizardFieldsEl.innerHTML = "";
        // پاکسازی خطاهای صفحه
    clearAllFieldErrors();

    visible.forEach(f => {
      if (f.type === "group") {
        wizardFieldsEl.appendChild(buildGroupField(f));
        return;
      }

      if (f.type === "choice") {
        const key = String(f.key || "");
        const useSelect =
          key === "identity__educationLevel" ||
          key === "physical__faceColor" ||
          key === "physical__eyeColor";

        wizardFieldsEl.appendChild(useSelect ? buildSelectField(f) : buildChoiceField(f));
      } else {
        wizardFieldsEl.appendChild(buildTextField(f));
      }
    });

    updateNav();

    if (wmNote) wmNote.style.display = "none";

    if (opts && opts.preserveFocusKey) {
      const el = wizardFieldsEl.querySelector(`[data-key="${opts.preserveFocusKey}"]`);
      if (el) el.focus();
    }
  }

  function updateNav() {
    const allLeaf = wizardSchema.pages.flatMap(p => getVisibleLeafFields(p));
    const requiredAll = allLeaf.filter(f => !f.optional);
    const answeredAll = requiredAll.filter(f => isFieldFilled(f.key)).length;

    const denom = Math.max(1, requiredAll.length);
    const percent = Math.round((answeredAll / denom) * 100);
    if (topProgressFill) topProgressFill.style.width = `${percent}%`;
    if (topProgressText) topProgressText.textContent = `${percent}% تکمیل شده`;

           // پیش‌نمایش فقط مراحل 1-3 (صفحه 0 تا 2). در صفحه 4 حذف می‌شود.
    const isLast = (currentPage === wizardSchema.pages.length - 1);

    if (wizardPreview) {
      wizardPreview.style.display = isLast ? "none" : "flex";
    }

    if (bottomPreviewBar) {
      bottomPreviewBar.textContent = isLast ? "نمایش و بررسی فرم نهایی" : "پیش‌نمایش موقت";
      // پیش‌نمایش در مراحل 1-3 همیشه در دسترس است (حتی اگر ناقص باشد)
      bottomPreviewBar.disabled = false;
    }

    if (bottomPreviewCta) {
      bottomPreviewCta.textContent = isLast ? "" : "برای بررسی اولیه";
    }

    // Next/Prev
    if (prevStepBtn) prevStepBtn.disabled = (currentPage === 0);
   const page = wizardSchema.pages[currentPage];

    if (nextStepBtn) {
      if (!isLast) {
      nextStepBtn.textContent = "ادامه";
        nextStepBtn.disabled = DEV_MODE ? false : !isPageComplete(page);
      } else {
         nextStepBtn.textContent = "نمایش و بررسی فرم نهایی";
        nextStepBtn.disabled = DEV_MODE ? false : !isAllComplete();
      }
    }

    // pills live
    renderPills();
  }

  // ===== Nav button events (bind ONCE) =====
  if (prevStepBtn) {
    prevStepBtn.addEventListener("click", () => {
      if (currentPage > 0) {
        currentPage -= 1;
        renderPage();
      }
    });
  }

  if (nextStepBtn) {
    nextStepBtn.addEventListener("click", () => {
      const isLast = (currentPage === wizardSchema.pages.length - 1);
      const page = wizardSchema.pages[currentPage];

      if (!isLast) {
              if (!DEV_MODE && !isPageComplete(page)) {
          const leaf = getVisibleLeafFields(page).filter(f => !f.optional);
          const firstMissing = leaf.find(f => !isFieldFilled(f.key));
          if (firstMissing) {
            showFieldError(firstMissing.key, "این مورد الزامی است.");
            scrollToField(firstMissing.key);
          }
          return;
        }
        currentPage += 1;
        renderPage();
        return;
      }

           if (!DEV_MODE && !isAllComplete()) {
        // برو به اولین صفحه ناقص
        const idx = wizardSchema.pages.findIndex(p => !isPageComplete(p));
        if (idx >= 0) {
          currentPage = idx;
          renderPage();
        }
        return;
      }

      if (bottomPreviewBar) bottomPreviewBar.click();
    });
  }


  // ====== PNG TEXT RENDER ======
  async function drawTextAsPngOnPdf(pdfDoc, page, text, x, y, fontSize) {
    const t = String(text ?? "").trim();
    if (!t) return;

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    const pad = Math.ceil(fontSize * 0.6);

    ctx.font = `${fontSize}px Vazirmatn`;
    ctx.direction = "rtl";
    ctx.textAlign = "right";
    ctx.textBaseline = "alphabetic";

    const m = ctx.measureText(t);
    const w = Math.ceil(m.width) + pad * 2;
    const h = Math.ceil(fontSize * 1.6) + pad * 2;

    canvas.width = w;
    canvas.height = h;

    ctx.font = `${fontSize}px Vazirmatn`;
    ctx.direction = "rtl";
    ctx.textAlign = "right";
    ctx.textBaseline = "alphabetic";

    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = "#000";
    ctx.fillText(t, w - pad, h - pad);

    const dataUrl = canvas.toDataURL("image/png");
    const pngBytes = await fetch(dataUrl).then(r => r.arrayBuffer());
    const png = await pdfDoc.embedPng(pngBytes);

    const SCALE = 0.75;
    const imgW = w * SCALE;
    const imgH = h * SCALE;

    page.drawImage(png, {
      x: x - imgW + 1,
      y: y - (fontSize * SCALE),
      width: imgW,
      height: imgH,
    });
  }

  function splitFullName(fullName) {
    const t = String(fullName || "").trim().replace(/\s+/g, " ");
    if (!t) return { firstName: "", lastName: "" };
    const parts = t.split(" ");
    if (parts.length === 1) return { firstName: t, lastName: "" };
    return { firstName: parts[0], lastName: parts.slice(1).join(" ") };
  }

  function splitByPipeOrComma(text) {
    const t = String(text || "").trim();
    if (!t) return [];
    return t.split(/[\|،,؛;]+/g).map(s => s.trim()).filter(Boolean);
  }

  function parseStatusBlock(text) {
    const parts = splitByPipeOrComma(text);
    const p0 = parts[0] || "";
    const p1 = parts[1] || "";
    const p2 = parts[2] || "";

    const gender = (p0.includes("زن") ? "زن" : (p0.includes("مرد") ? "مرد" : p0));
    let marital = p1;
    if (p1.includes("مجرد")) marital = "مجرد";
    else if (p1.includes("متأهل") || p1.includes("متاهل")) marital = "متأهل";

    const religion = p2 || "";
    return { gender: String(gender || "").trim(), marital: String(marital || "").trim(), religion: String(religion || "").trim() };
  }

  function parseJobBlock(text) {
    const parts = splitByPipeOrComma(text);
    return { title: parts[0] || "", org: parts[1] || "", addressFull: parts.slice(2).join(" | ") || "" };
  }

  function parseMilitaryDetailBlock(text) {
    const parts = splitByPipeOrComma(text);
    return { job: parts[0] || "", exitType: parts[1] || "" };
  }

  function parseRelativeBlock(text) {
    const parts = splitByPipeOrComma(text);
    return { fullName: parts[0] || "", job: parts[1] || "", address: parts[2] || "", phone: parts[3] || "" };
  }

  function buildExpandedAnswers(answersObj) {
    const a = Object.assign({}, answersObj);

    // Full name -> first/last
    if (a["identity__fullName"]) {
      const s = splitFullName(a["identity__fullName"]);
      a["identity__firstName"] = s.firstName;
      a["identity__lastName"] = s.lastName;
    }

    // status block -> gender/marital/religion
    if (a["identity__statusBlock"]) {
      const p = parseStatusBlock(a["identity__statusBlock"]);
      if (p.gender) a["identity__gender"] = p.gender;
      if (p.marital) a["identity__marital"] = p.marital;
      if (p.religion) a["identity__religion"] = p.religion;
    }

    // job block
    if (a["job__block"]) {
      const p = parseJobBlock(a["job__block"]);
      a["job__title"] = p.title;
      a["job__org"] = p.org;
      a["job__addressFull"] = p.addressFull;
    }

    // marksShort -> hasMarks
    const ms = String(a["physical__marksShort"] || "").trim();
    a["physical__hasMarks"] = ms ? "بله" : "خیر";

    // military detail -> old keys (اگر has=بله)
    if ((String(a["military__has"] || "").trim() === "بله") && a["military__detailBlock"]) {
      const p = parseMilitaryDetailBlock(a["military__detailBlock"]);
      a["military__job"] = p.job;
      a["military__exitType"] = p.exitType;
    } else {
      a["military__job"] = a["military__job"] || "";
      a["military__exitType"] = a["military__exitType"] || "";
    }

    // relatives for future
    if (a["rel1__block"]) {
      const p = parseRelativeBlock(a["rel1__block"]);
      a["rel1__fullName"] = p.fullName;
      a["rel1__job"] = p.job;
      a["rel1__address"] = p.address;
      a["rel1__phone"] = p.phone;
    }
    if (a["rel2__block"]) {
      const p = parseRelativeBlock(a["rel2__block"]);
      a["rel2__fullName"] = p.fullName;
      a["rel2__job"] = p.job;
      a["rel2__address"] = p.address;
      a["rel2__phone"] = p.phone;
    }

    // UI حذف شده؛ برای map خالی نگه می‌داریم
    a["identity__enFullName"] = "";

    return a;
  }

  async function generatePdf(answersObj) {
        // تضمین لود شدن فونت قبل از render روی canvas (برای جلوگیری از fallback)
    try {
      if (document.fonts && document.fonts.load) {
        await document.fonts.load('16px "Vazirmatn"');
        await document.fonts.ready;
      }
    } catch (e) {
      // اگر مرورگر پشتیبانی نکند، بدون کرش ادامه می‌دهیم
    }
    
    const { PDFDocument } = PDFLib;
    const a = buildExpandedAnswers(answersObj);

    const templateUrl = "assets/forms/passport.pdf";

      "military__job":              { "page": 0, "x": 441,   "y": 405,    "size": 11 },
      "military__exitType":         { "page": 0, "x": 198.19,"y": 404.44, "size": 11 },

      "travel__country":            { "page": 0, "x": 429.38,"y": 294.1,  "size": 11 },
      "travel__purpose":            { "page": 0, "x": 408.75,"y": 274.38, "size": 11 },

      "previousPassport__number":        { "page": 0, "x": 202.5, "y": 188.13, "size": 11 },
      "previousPassport__issueDate":     { "page": 0, "x": 92.5,  "y": 190.63, "size": 11 },
      "previousPassport__issuePlace":    { "page": 0, "x": 461.63,"y": 175.37, "size": 11 },
      "previousPassport__expireDate":    { "page": 0, "x": 209.75,"y": 173.62, "size": 11 }
    };

    for (const [key, cfg] of Object.entries(PDF_FIELD_MAP)) {
      const pIndex = Number(cfg.page || 0);
      const page = pdfDoc.getPages()[pIndex];
      if (!page) continue;

      await drawTextAsPngOnPdf(
        pdfDoc,
        page,
        a[key],
        Number(cfg.x),
        Number(cfg.y),
        Number(cfg.size || 11)
      );
    }

    const pdfBytes = await pdfDoc.save();
    const blob = new Blob([pdfBytes], { type: "application/pdf" });
    const url = URL.createObjectURL(blob);

    const link = document.createElement("a");
    link.href = url;
    link.download = "passport-filled.pdf";
    link.click();
    setTimeout(() => URL.revokeObjectURL(url), 1500);
  }

  if (bottomPreviewBar) {
    bottomPreviewBar.addEventListener("click", async function () {
      try {
        await generatePdf(answers);
      } catch (err) {
        console.error(err);
        alert("خطا در ساخت PDF");
      }
    });
  }

  // init
  renderPage();
});
