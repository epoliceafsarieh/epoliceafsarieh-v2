<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>فرم مرحله‌ای گذرنامه</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

 <style>
@font-face{
  font-family: "Vazirmatn";
  src: url("assets/fonts/vazirmatn/Vazirmatn-Regular.woff2") format("woff2");
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
body{
  font-family: "Vazirmatn", sans-serif;
  margin: 0;
  padding: 16px;
  padding-left: max(16px, env(safe-area-inset-left));
  padding-right: max(16px, env(safe-area-inset-right));
  background: linear-gradient(to bottom, #eef2f8 0%, #f6f8fc 60%);
  color: #0f172a;
  overflow-x: hidden;
}

.flow-wrap{
  max-width: 560px;
  margin: 0 auto;
}

/* Header (minimal, aligned) */
.flow-top{
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 6px 6px;
}

.flow-service{
  font-size: 12px;
  color: rgba(15, 23, 42, .45);
  letter-spacing: .2px;
}

.back-link{
  display: inline-flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  color: #0f172a;
  font-size: 13px;
  font-weight: 500;
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(15, 23, 42, 0.05);
  border: 1px solid rgba(15, 23, 42, 0.08);
}
.back-link:hover{
  background: rgba(15, 23, 42, 0.07);
}
/* Head text */
.flow-head{
  margin: 18px 6px 14px;
}
.flow-kicker{
  font-size: 12px;
  color: rgba(15, 23, 42, .55);
  margin-bottom: 6px;
}
.flow-title{
  margin: 0 0 6px 0;
  font-size: 18px;
  line-height: 1.7;
  font-weight: 700;
  color: #0f172a;
}
.flow-subtitle{
  font-size: 13px;
  line-height: 1.8;
  color: rgba(15, 23, 42, .65);
}

/* Main card */
.card{
  background: #ffffff;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(2, 8, 23, .06);
  border: 1px solid rgba(2, 8, 23, .07);
  padding: 22px;
  margin: 14px 0 0;
}

/* Progress */
.progress{
  font-size: 12px;
  color: rgba(15, 23, 42, .50);
  margin-bottom: 6px;
  text-align: right;
}

/* Question */
h3{
  margin: 0 0 14px 0;
  font-size: 20px;
  line-height: 1.9;
  font-weight: 700;
}

/* Input */
input{
  width: 100%;
  padding: 14px 14px;
  font-size: 16px; /* مهم: iOS zoom نشود */
  border-radius: 14px;
  border: 1px solid #e5eaf3;
  background: #f8fafc;
  outline: none;

  text-align: right;
  direction: rtl;
  box-sizing: border-box;
}

.voice{
  width: 52px;
  height: 52px;
  padding: 0;
  border-radius: 999px;
  background: linear-gradient(to bottom, #17335f, #0f2547);
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 10px auto 0; /* وسط */
}


/* Buttons */
button{
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  margin-top: 10px;
  min-height: 52px; /* Thumb-friendly */
}

.primary{
  color: #fff;
  background: linear-gradient(to bottom, #17335f, #0f2547);
  box-shadow: 0 10px 20px rgba(15, 37, 71, .25);
}
/* iOS hint */
.ios-hint{
  display:none;
  margin-top: 10px;
  font-size: 13px;
  color: rgba(15, 23, 42, .60);
  line-height: 1.8;
}

/* Bottom links */
.bottom-row{
  margin-top: 14px;
  display: flex;
  justify-content: space-between;
  gap: 10px;
  font-size: 13px;
  color: rgba(15, 23, 42, .60);
}
.bottom-row a{
  text-decoration: none;
  color: rgba(15, 37, 71, .95);
  opacity: .9;
}

/* Success state polish */
.success-note{
  margin-top: 10px;
  font-size: 13px;
  color: rgba(15, 23, 42, .60);
}

/* Blink (ONLY ONCE) */
@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: .35; }
  100% { opacity: 1; }
}

/* Mobile */
@media (max-width: 480px){
  body{ padding: 14px; }
  .flow-title{ font-size: 19px; }
  .card{ padding: 20px; }
}
@media (min-width: 900px){
  .flow-head{ margin-top: 8px; }
  .card{ margin-top: 12px; }
}

/* ===== Service-like top bar ===== */
.flow-top--service{
  padding: 14px 6px 6px;
}
/* [ANCHOR:C1 TOPBAR-ALIGN] */
.flow-top--service{
  direction: ltr; /* ترتیب بصری را چپ→راست می‌کند */
}
.flow-top--service *{
  direction: rtl; /* متن‌ها همچنان RTL بمانند */
}

.cta-service{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  padding: 12px 18px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 700;
  color:#fff;
  background: linear-gradient(to bottom, #17335f, #0f2547);
  box-shadow: 0 10px 20px rgba(15, 37, 71, .22);
}

/* ===== Section steps (top small list) ===== */
   .section-steps::-webkit-scrollbar{
  display:none;
}
.section-steps{
 display:flex;
 flex-wrap: nowrap;
  gap: 8px;
  justify-content:flex-start; /* چون container LTR است، این یعنی سمت چپ بصری */
  align-items:center;
    overflow-x: auto;
  white-space: nowrap;
  scrollbar-width: none;
  max-width: 100%;
  
}
  /* Desktop: grouped rows for section pills */
@media (min-width: 700px){
  .section-steps.is-grouped{
    display: block;
    overflow: visible;
    white-space: normal;
  }
  .section-steps.is-grouped .section-row{
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
} 

.section-pill{
  display:inline-flex;
  align-items:center;
  gap: 4px;
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 11px;
  line-height: 1;
  background: rgba(23,51,95,.08);
  color: #0f2547;
  white-space: nowrap;
     border: 1px solid rgba(15,37,71,.22);
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  outline: none;
  font-family: inherit;
   width: auto;
  margin-top: 0;
  min-height: 0;
 }

.section-pill.is-active{
  font-weight: 800;
  color: #0f2547;
  border-color: rgba(15,37,71,.55);
}

.section-pill.is-done{
  color: rgba(15,23,42,.85);
}

.section-pill .tick{
  font-size: 12px;
  color: #1f6b4a;
  line-height: 1;
}

/* ===== Head becomes the main hero (question+input) ===== */
.flow-head--compact{
  margin: 20px 6px 10px;
}

.hero-question{
  font-size: 28px;
  line-height: 1.5;
  font-weight: 800;
  text-align: center;
  color: rgba(15,23,42,.65);
  margin: 28px 0 14px;
}

.hero-row{
  display:flex;
  align-items:center;
  gap: 0;                 /* بچسبند */
  justify-content:center;
  flex-wrap: nowrap;
}

/* قاب واحد برای اینکه سه تکه یکپارچه دیده شود */
.hero-shell{
  width: min(520px, 100%);
  margin: 0 auto;
  border-radius: 22px;
  border: 1px solid rgba(2,8,23,.10);
  background: rgba(255,255,255,.85);
  box-shadow: 0 14px 30px rgba(2,8,23,.08);
  overflow: hidden; /* لبه‌ها یکدست */
}

.hero-next{
  width: 88px;
  height: 72px;
  border-radius: 18px;
  border: 1px solid rgba(2,8,23,.10);
   color:#fff;
  font-size: 22px;
  cursor:pointer;
}

.hero-next:disabled{
  opacity: .35;
  cursor: not-allowed;
  box-shadow: none;
}

.hero-input{
  flex: 1;
  min-width: 0;
  width: auto;
  height: 72px;
  border-radius: 22px;
  padding: 0 22px;
  font-size: 22px;
  font-weight: 700;
  text-align: right;
  direction: rtl;
}

/* دکمه‌ها */
.hero-btn{
  width: 88px;
  height: 72px;
  border-radius: 18px;
  border: 1px solid rgba(2,8,23,.10);
    background: linear-gradient(to bottom, #17335f, #0f2547);
  color: #fff;
  font-size: 22px;
  cursor: pointer;
  margin-top: 0;

  display: inline-flex;
  align-items: center;
  justify-content: center;

  transition: opacity .18s ease, transform .18s ease, filter .18s ease;
}

.hero-btn:disabled{
  opacity: .28;
  cursor: not-allowed;
  box-shadow: none;
  filter: grayscale(.2);
}

/* اتصال به input (لبه‌های داخلی مربع‌تر شوند) */
.hero-prev{ border-top-left-radius: 0; border-bottom-left-radius: 0; }
.hero-next{ border-top-right-radius: 0; border-bottom-right-radius: 0; }

.hero-input{
  border-radius: 0;        /* وسط تخت شود */
  border-left: 0;
  border-right: 0;
}

/* placeholder blink */
.hero-input::placeholder{
  color: rgba(15,23,42,.28);
  font-weight: 800;
  animation: blink 1s infinite;
}

.hero-input:focus{
  outline:none;
  border-color: rgba(28,61,117,.45);
  box-shadow: 0 0 0 3px rgba(28,61,117,.08), 0 14px 30px rgba(2,8,23,.08);
}
/* Choices (radio-like pills) */
.choice-wrap{
  width: min(520px, 100%);
  margin: 10px auto 0;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.choice-btn{
  padding: 10px 14px;
  border-radius: 999px;
  border: 1px solid rgba(15,37,71,.22);
  background: rgba(23,51,95,.08);
  color: #0f2547;
  font-family: inherit;
  font-size: 14px;
  cursor: pointer;
}

.choice-btn.is-selected{
  border-color: rgba(15,37,71,.55);
  background: rgba(23,51,95,.16);
  font-weight: 800;
}
/* dots */
.dots{
  display:flex;
    justify-content:center;
  gap: 8px;
  margin: 10px 0 0;
  flex-wrap: nowrap;
}

/* ظرف نقطه‌ها: عرض مثل ورودی، و با padding راست مثل شروع placeholder */
.dots-wrap{
  width: min(520px, 100%);
  margin: 12px auto 0;
  padding-right: 0px;
  box-sizing: border-box;
}

.dot{
  width: 14px;
  height: 14px;
  border-radius: 999px;
  background: rgba(2,8,23,.10);              /* خاکستری: شروع نشده */
  border: 1px solid rgba(2,8,23,.12);
  box-shadow: inset 0 1px 1px rgba(255,255,255,.7);
}

.dot.is-warn{
  background: rgba(245, 158, 11, .45);        /* زرد: ناقص */
  border-color: rgba(245, 158, 11, .40);
}

.dot.is-done{
  background: rgba(31,107,74,.55);           /* سبز: کامل */
  border-color: rgba(31,107,74,.45);
}

.dot.is-active{
  border-color: rgba(2,8,23,.28);            /* فعال: فقط دورش پررنگ‌تر */
}

/* Actions card becomes minimal (just buttons) */
.card--actions{
  margin-top: 18px;
  max-width: 560px;
}

/* Mobile tweaks */
@media (max-width: 480px){
  .hero-question{ font-size: 22px; margin-top: 18px; }
  .hero-input{ height: 62px; font-size: 18px; border-radius: 18px; }
  .hero-btn{ width: 72px; height: 62px; }
  .dot{ width: 12px; height: 12px; }
}
</style>
</head>

<div class="flow-wrap">

<div class="flow-top flow-top--service">
  <!-- لیست بخش‌ها (ریز، از راست شروع می‌شود) -->
  <div class="section-steps" id="sectionSteps" aria-label="بخش‌های فرم"></div>

  <!-- دکمه دانلود: فقط وقتی همه بخش‌ها کامل شد نمایش داده می‌شود -->
  <a class="cta-service" id="topDownloadLink" href="assets/forms/passport.pdf" download style="display:none;">
    دریافت فرم گذرنامه
  </a>
</div>

 <div class="flow-head flow-head--compact">
  <div class="hero-question" id="heroQuestion">نام خود را بنویسید</div>

<!-- [ANCHOR:A1 HERO-ROW] -->
<div class="hero-shell">
  <div class="hero-row">
    <!-- مرحله قبل (سمت راستِ صفحه RTL) -->
    <button class="hero-btn hero-prev" id="prevButton" type="button" aria-label="مرحله قبل">▶</button>

    <!-- ورودی -->
    <input
      class="hero-input"
      type="text"
      id="answerInput"
      inputmode="text"
      autocomplete="off"
      autocorrect="on"
      autocapitalize="none"
      spellcheck="true"
      placeholder=""
    />

    <!-- مرحله بعد (سمت چپِ صفحه RTL) -->
    <button class="hero-btn hero-next" id="nextButton" type="button" aria-label="مرحله بعد">◀</button>
  </div>
</div>
 <div class="choice-wrap" id="choiceWrap" style="display:none;"></div>  

<div class="dots-wrap">
  <div class="dots" id="dots"></div>
</div>

</div>

 <div class="card card--actions">

  <div class="ios-hint" id="iosHint">
    در آیفون، برای ورود صوتی از میکروفونِ کیبورد استفاده کنید.
  </div>

<button class="voice" id="voiceButton" type="button" aria-label="ورود صوتی">🎤</button>

  <div class="bottom-row">
    <a href="passport.html">خروج</a>
    <a href="#" onclick="location.reload(); return false;">شروع مجدد</a>
  </div>

  <div class="success-note" id="wmNote" style="display:none;">
    فایل خروجی شامل واترمارک دفتر است.
  </div>
</div>

</div>

  function normalizePersianNumbers(text) {

    const sectionStartSteps = [];

  // ====== PNG TEXT RENDER ======
  async function drawTextAsPngOnPdf(pdfDoc, page, text, x, y, fontSize) {
    const t = String(text ?? "").trim();
    if (!t) return;

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    const pad = Math.ceil(fontSize * 0.6);

    ctx.font = `${fontSize}px Vazirmatn`;
    ctx.direction = "rtl";
    ctx.textAlign = "right";
    ctx.textBaseline = "alphabetic";

    const m = ctx.measureText(t);
    const w = Math.ceil(m.width) + pad * 2;
    const h = Math.ceil(fontSize * 1.6) + pad * 2;

    canvas.width = w;
    canvas.height = h;

    ctx.font = `${fontSize}px Vazirmatn`;
    ctx.direction = "rtl";
    ctx.textAlign = "right";
    ctx.textBaseline = "alphabetic";

    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = "#000";
    ctx.fillText(t, w - pad, h - pad);

    const dataUrl = canvas.toDataURL("image/png");
    const pngBytes = await fetch(dataUrl).then(r => r.arrayBuffer());
    const png = await pdfDoc.embedPng(pngBytes);

    const SCALE = 0.75;
    const imgW = w * SCALE;
    const imgH = h * SCALE;

    page.drawImage(png, {
      x: x - imgW + 1,
      y: y - (fontSize * SCALE),
      width: imgW,
      height: imgH,
    });
  }
