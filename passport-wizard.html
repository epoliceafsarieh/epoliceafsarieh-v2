<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>فرم مرحله‌ای گذرنامه</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

 <style>
@font-face{
  font-family: "Vazirmatn";
  src: url("assets/fonts/vazirmatn/Vazirmatn-Regular.woff2") format("woff2");
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
body{
  font-family: "Vazirmatn", sans-serif;
  margin: 0;
  padding: 16px;
    padding-bottom: 24px; 
  padding-left: max(16px, env(safe-area-inset-left));
  padding-right: max(16px, env(safe-area-inset-right));
background: #0f2547; /* سرمه‌ای */
  
  overflow-x: hidden;
}

.flow-wrap{
  max-width: 560px;
  margin: 0 auto;
}

/* Header (minimal, aligned) */
.flow-top{
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 6px 6px;
}

.flow-service{
  font-size: 12px;
  color: rgba(15, 23, 42, .45);
  letter-spacing: .2px;
}

.back-link{
  display: inline-flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
   font-size: 13px;
  font-weight: 500;
  padding: 8px 12px;
  border-radius: 999px;
  color: #fff;
background: rgba(255,255,255,.12);
border: 1px solid rgba(255,255,255,.18);
}
.back-link:hover{
 background: rgba(255,255,255,.16);
}
/* Head text */
.flow-head{
  margin: 18px 6px 14px;
}
.flow-kicker{
  font-size: 12px;
  color: rgba(15, 23, 42, .55);
  margin-bottom: 6px;
}
.flow-title{
  margin: 0 0 6px 0;
  font-size: 18px;
  line-height: 1.7;
  font-weight: 700;
  
}
.flow-subtitle{
  font-size: 13px;
  line-height: 1.8;
  color: rgba(15, 23, 42, .65);
}

/* Main card */
.card{
  background: #ffffff;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(2, 8, 23, .06);
  border: 1px solid rgba(2, 8, 23, .07);
  padding: 22px;
  margin: 14px 0 0;
}

/* Progress */
.progress{
  font-size: 12px;
  color: rgba(15, 23, 42, .50);
  margin-bottom: 6px;
  text-align: right;
}

/* Question */
h3{
  margin: 0 0 14px 0;
  font-size: 20px;
  line-height: 1.9;
  font-weight: 700;
}

/* Input */
input{
  width: 100%;
  padding: 14px 14px;
  font-size: 16px; /* مهم: iOS zoom نشود */
  border-radius: 14px;
  border: 1px solid #e5eaf3;
  background: #f8fafc;
  outline: none;

  text-align: right;
  direction: rtl;
  box-sizing: border-box;
}

.voice{
  width: 52px;
  height: 52px;
  padding: 0;
  border-radius: 999px;
  background: linear-gradient(to bottom, #17335f, #0f2547);
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 10px auto 0; /* وسط */
}


/* Buttons */
button{
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  margin-top: 10px;
  min-height: 52px; /* Thumb-friendly */
}

.primary{
  color: #fff;
  background: linear-gradient(to bottom, #17335f, #0f2547);
  box-shadow: 0 10px 20px rgba(15, 37, 71, .25);
}
/* iOS hint */
.ios-hint{
  display:none;
  margin-top: 10px;
  font-size: 13px;
  color: rgba(15, 23, 42, .60);
  line-height: 1.8;
}
/* Bottom sticky preview bar */
.preview-bar{
 position: static;
  width: 100%;
  border: none;
  cursor: pointer;
 font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;

  padding: 16px 18px;
  background: linear-gradient(to bottom, #17335f, #0f2547);
  color: #fff;

box-shadow: 0 14px 26px rgba(2,8,23,.14);
}

.preview-bar__title{
  font-size: 14px;
  font-weight: 800;
}

.preview-bar__cta{
  font-size: 14px;
  font-weight: 900;
  opacity: .95;
}

.preview-bar:disabled{
  opacity: .55;
  cursor: not-allowed;
}
/* Bottom links */
.bottom-row{
  margin-top: 14px;
  display: flex;
  justify-content: space-between;
  gap: 10px;
  font-size: 13px;
  color: rgba(15, 23, 42, .60);
}
.bottom-row a{
  text-decoration: none;
  color: rgba(15, 37, 71, .95);
  opacity: .9;
}

/* Success state polish */
.success-note{
  margin-top: 10px;
  font-size: 13px;
  color: rgba(15, 23, 42, .60);
}

/* Blink (ONLY ONCE) */
@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: .35; }
  100% { opacity: 1; }
}

/* Mobile */
@media (max-width: 480px){
  body{ padding: 14px; }
  .flow-title{ font-size: 19px; }
  .card{ padding: 20px; }
}
@media (min-width: 900px){
  .flow-head{ margin-top: 8px; }
  .card{ margin-top: 12px; }
}

/* ===== Service-like top bar ===== */
.flow-top--service{
  padding: 14px 6px 6px;
}
/* [ANCHOR:C1 TOPBAR-ALIGN] */
.flow-top--service{
  direction: ltr; /* ترتیب بصری را چپ→راست می‌کند */
}
.flow-top--service *{
  direction: rtl; /* متن‌ها همچنان RTL بمانند */
}

.cta-service{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  padding: 12px 18px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 700;
  color:#fff;
  background: linear-gradient(to bottom, #17335f, #0f2547);
  box-shadow: 0 10px 20px rgba(15, 37, 71, .22);
}

/* ===== Section steps (top small list) ===== */
   .section-steps::-webkit-scrollbar{
  display:none;
}
.section-steps{
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  width: min(420px, 100%);
  margin: 0;
}
  .section-steps--nav{
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
  /* Desktop: grouped rows for section pills */
@media (min-width: 700px){
  .section-steps.is-grouped{
    display: block;
    overflow: visible;
    white-space: normal;
  }
  .section-steps.is-grouped .section-row{
    display: flex;
    gap: 8px;
   justify-content: flex-end;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
} 

.section-pill{
  display:inline-flex;
  align-items:center;
  gap: 4px;
  justify-content: center;
min-height: 36px;
  padding: 8px 10px;
font-size: 12px;
white-space: nowrap;
  border-radius: 999px;
  line-height: 1;
  background: rgba(15,23,42,.06); /* خاکستری: هیچ‌چیز پر نشده */
  color: rgba(15,23,42,.75);
  border: 1px solid rgba(15,23,42,.14);
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  outline: none;
  font-family: inherit;
   width: auto;
  margin-top: 0;
  }
 /* سه‌حالته: خاکستری/زرد/سبز */
.section-pill.is-empty{
  background: rgba(15,23,42,.06);
  border-color: rgba(15,23,42,.14);
  color: rgba(15,23,42,.70);
}

.section-pill.is-warn{
  background: rgba(245,158,11,.16);
  border-color: rgba(245,158,11,.30);
  color: rgba(15,23,42,.82);
}

.section-pill.is-done{
  background: rgba(31,107,74,.14);
  border-color: rgba(31,107,74,.28);
  color: rgba(15,23,42,.88);
}  

.section-pill.is-active{
  font-weight: 800;
 }
.section-pill .tick{
  font-size: 12px;
  color: #1f6b4a;
  line-height: 1;
}

/* ===== Head becomes the main hero (question+input) ===== */
.flow-head--compact{
  margin: 20px 6px 10px;
}
 /* ===== Wizard (multi-field per page) ===== */
.wizard-shell{
  width: min(520px, 100%);
  margin: 0 auto;
  border-radius: 22px;
  border: 1px solid rgba(2,8,23,.10);
  background: rgba(255,255,255,.92);
  box-shadow: 0 14px 30px rgba(2,8,23,.08);
  overflow: hidden;
}

.wizard-nav{
  display:flex;
  align-items:center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 12px;
  border-bottom: 1px solid rgba(2,8,23,.08);
}

.wizard-progress{
  flex: 1;
  text-align: center;
  font-size: 12px;
  font-weight: 800;
  color: rgba(15,23,42,.65);
  white-space: nowrap;
}

.voice--inline{
  width: 52px;
  height: 52px;
  margin: 0;
  border-radius: 999px;
  border: 1px solid rgba(2,8,23,.10);
  box-shadow: 0 12px 22px rgba(2,8,23,.14);
  padding: 0;
  background: linear-gradient(to bottom, #17335f, #0f2547);
  color: #fff;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.wizard-body{
  padding: 14px 14px 16px;
}

.wizard-title{
  font-size: 18px;
  font-weight: 900;
  color: rgba(15,23,42,.78);
  text-align: center;
  margin: 8px 0 12px;
}

.wizard-fields{
  display:flex;
  flex-direction: column;
  gap: 10px;
}
   .field{
  position: relative;
  display:flex;
  flex-direction: column;
  gap: 6px;
}

.field-label{
  position: absolute;
  right: 14px;
  top: 12px;
  font-size: 12px;
  font-weight: 800;
  color: rgba(15,23,42,.55);
  pointer-events: none;
  transition: transform .16s ease, opacity .16s ease, font-size .16s ease;
  background: rgba(248,250,252,.92);
  padding: 0 6px;
  border-radius: 8px;
}

.field input,
.field textarea{
  width: 100%;
  border-radius: 14px;
  border: 1px solid rgba(2,8,23,.12);
  background: rgba(248,250,252,.92);
 padding: 26px 12px 12px;
  font-size: 16px;
  box-sizing: border-box;
  font-family: inherit;
}
   .field input:focus + .field-label,
.field textarea:focus + .field-label,
.field input:not(:placeholder-shown) + .field-label,
.field textarea:not(:placeholder-shown) + .field-label{
  transform: translateY(-10px);
  font-size: 11px;
  opacity: .85;
}
   

.field textarea{
  min-height: 64px;
  resize: vertical;
}

/* choice inside wizard */
.choice-row{
  display:flex;
  flex-wrap: wrap;
  gap: 8px;
  overflow: hidden;
}
.choice-row::-webkit-scrollbar{ display:none; }
.choice-row .choice-btn{
  height: 36px;
  font-size: 13px;
  padding: 0 10px;
  white-space: nowrap;
}
 /* [FIX:CHOICE-BTN-OVERRIDE] */
.choice-btn{
  width: auto !important;     /* مهم: ضدِ button{width:100%} */
  min-height: 0 !important;   /* ضدِ button{min-height:52px} */
  margin-top: 0 !important;   /* ضدِ button{margin-top:10px} */

  padding: 0 12px !important;
  border-radius: 14px !important;

  border: 1px solid rgba(2,8,23,.16);
  background: rgba(255,255,255,.95);
  color: #0f2547;

  font-family: inherit;
  font-weight: 800;
  cursor: pointer;
}  

/* Desktop: کمی فشرده‌تر */
@media (min-width: 700px){
  .wizard-shell{ width: min(460px, 100%); }
  .wizard-title{ font-size: 16px; margin: 6px 0 10px; }
  .wizard-body{ padding: 12px 14px 14px; }
  .voice--inline{ width: 48px; height: 48px; }
}  


/* پیش‌نمایش داخل صفحه (نه sticky) */
.preview-bar--inline{
  position: static;
  width: min(520px, 100%);
  margin: 12px auto 0;
  border-radius: 18px;
  box-shadow: 0 14px 26px rgba(2,8,23,.14);
  background: linear-gradient(to bottom, #111827, #0b1220); /* ذغالی */
  position: relative;
  overflow: hidden;
}
 .preview-meter{
  position:absolute;
  inset:0;
  background: rgba(255,255,255,.08);
  z-index: 0;
}
.preview-meter__fill{
  position:absolute;
  top:0;
  bottom:0;
  right:0;            /* RTL: از راست پر شود */
  width: 0%;
  background: rgba(34,197,94,.40);
}
.preview-bar--inline > *{
  position: relative;
  z-index: 1;
}  
.preview-bar--inline .preview-bar__title{
  font-weight: 800;
}

/* bottom-row تک‌لینک */
.bottom-row--single{
  justify-content: center;
} 
 .flow-head--compact{ position: relative; }



/* مربع چک‌باکس کوچک */
.choice-btn::before{
  content: "";
  width: 16px;
  height: 16px;
  border-radius: 6px;
  border: 2px solid rgba(15,37,71,.45);
  background: transparent;
  box-sizing: border-box;
}

.choice-btn.is-selected{
  border-color: rgba(15,37,71,.65);
  background: rgba(23,51,95,.08);
}

.choice-btn.is-selected::before{
  background: #1f6b4a;
  border-color: #1f6b4a;
  box-shadow: inset 0 0 0 3px rgba(255,255,255,.95);
}

/* رنگ انتخاب بر اساس بله/خیر */
.choice-btn.is-selected.is-yes{
  border-color: rgba(31,107,74,.75);
  background: rgba(31,107,74,.08);
}
.choice-btn.is-selected.is-yes::before{
  background: #1f6b4a;
  border-color: #1f6b4a;
}

.choice-btn.is-selected.is-no{
  border-color: rgba(185,28,28,.75);
  background: rgba(185,28,28,.06);
}
.choice-btn.is-selected.is-no::before{
  background: #b91c1c;
  border-color: #b91c1c;
}


/* Actions card becomes minimal (just buttons) */
.card--actions{
  margin-top: 18px;
  max-width: 560px;

  /* حذف ظاهر کارت، ولی محتوا باقی بماند */
  background: transparent;
  border: none;
  box-shadow: none;
  padding: 0;
}

/* Mobile tweaks (choices only) */
@media (max-width: 480px){
  .choice-row .choice-btn{
    height: 34px;
    font-size: 12px;
    padding: 0 10px;
  }
}
</style>
</head>
<body>

<div class="flow-wrap">

<div class="flow-top flow-top--service">
  <!-- بازگشت (بالا-چپ) -->
  <a class="back-link" href="passport.html" aria-label="بازگشت">بازگشت</a>

  <!-- لیست بخش‌ها (بالا-راست) -->
 </div>

 <div class="flow-head flow-head--compact">

<!-- [ANCHOR:A1 HERO-ROW] -->
<div class="wizard-shell" id="wizardShell">
  <div class="wizard-nav">
    <div class="section-steps section-steps--nav" id="sectionSteps" aria-label="بخش‌های فرم"></div>
       <button class="voice voice--inline" id="voiceButton" type="button" aria-label="ورود صوتی">🎤</button>
  </div>

  <div class="wizard-body">
    <div class="wizard-title" id="wizardTitle">—</div>
    <div class="wizard-fields" id="wizardFields"></div>
  </div>
</div>
   


</div>

 <div class="card card--actions">
<!-- دکمه پیش‌نمایش/دانلود (حالا داخل صفحه، نه sticky) -->
<button class="preview-bar preview-bar--inline" id="bottomPreviewBar" type="button" aria-label="پیش‌نمایش فرم گذرنامه">
    <span class="preview-meter" aria-hidden="true"><span class="preview-meter__fill" id="previewFill"></span></span>
  <span class="preview-bar__title">پیش‌نمایش فرم گذرنامه</span>
  <span class="preview-bar__cta" id="bottomPreviewCta">—</span>
</button>
  <div class="ios-hint" id="iosHint">
    در آیفون، برای ورود صوتی از میکروفونِ کیبورد استفاده کنید.
  </div>

 <div class="bottom-row bottom-row--single">
  <a href="#" onclick="location.reload(); return false;">شروع مجدد</a>
</div>

  <div class="success-note" id="wmNote" style="display:none;">
    فایل خروجی شامل واترمارک دفتر است.
  </div>
</div>

</div>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  // ====== Wizard Schema (6 pages balanced) ======
  // نکته: نام و نام خانوادگی یکجا گرفته می‌شود (identity__fullName)
  // و در generatePdf برای mapping قدیمی split می‌شود.
const wizardSchema = {
  formTitle: "پرسشنامه درخواست صدور گذرنامه",
  pages: [
    {
      id: "p1_identity",
title: "هویت فردی",
      fields: [
  { key: "identity__fullName", label: "نام و نام خانوادگی" },
  { key: "identity__nationalId", label: "کد ملی", inputMode: "numeric", dir: "ltr" },
  { key: "identity__birthDateShamsi", label: "تاریخ تولد (شمسی)", placeholder: "مثال: ۱۳۷۲/۰۵/۲۱", inputMode: "numeric", dir: "ltr" },
  { key: "identity__birthPlace", label: "محل تولد" },
  { key: "identity__fatherName", label: "نام پدر" },

  {
    key: "identity__idCardCombo",
    label: "مشخصات شناسنامه",
    placeholder: "مثال: ۱۲۳۴۵ | تهران | ۱۳۸۵/۰۲/۱۰ | الف ۱۲۳۴۵۶",
    multiline: true
  },

  {
    key: "identity__statusBlock",
    label: "وضعیت فردی",
    placeholder: "مثال: مرد | متأهل | اسلام"
  },

  {
    key: "identity__educationLevel",
    label: "تحصیلات",
    type: "choice",
    choices: ["زیر دیپلم","دیپلم","فوق‌دیپلم","کارشناسی","کارشناسی ارشد","دکتری","سایر"]
  },
  {
    key: "identity__major",
    label: "رشته",
    placeholder: "مثال: حقوق / کامپیوتر",
    when: { key: "identity__educationLevel", in: ["فوق‌دیپلم","کارشناسی","کارشناسی ارشد","دکتری"] }
  }
]
    },

    {
      id: "p2_personal_job",
title: "فعالیت شغلی",
      fields: [
        { key: "physical__heightCm", label: "قد (سانتی‌متر)", inputMode: "numeric", dir: "ltr" },
        { key: "physical__weightKg", label: "وزن (کیلوگرم)", inputMode: "numeric", dir: "ltr" },

        { key: "physical__faceColor", label: "رنگ چهره", type: "choice", choices: ["سفید","گندمگون","سبزه","تیره","سایر"] },
        { key: "physical__eyeColor", label: "رنگ چشم", type: "choice", choices: ["مشکی","قهوه‌ای","عسلی","آبی","سبز","میشی","سایر"] },

      { key: "physical__marksShort", label: "علائم ممیزه", placeholder: "مثال: جای زخم گونه چپ", optional: true },

        {
          key: "job__block",
label: "اطلاعات شغلی",
placeholder: "مثال: کارمند | شرکت X | تهران، ...",
          multiline: true
        },

        { key: "military__has", label: "سابقه نیروهای مسلح داشته‌اید؟", type: "choice", choices: ["بله","خیر"] },
        {
          key: "military__detailBlock",
        label: "جزئیات سابقه",
placeholder: "مثال: راننده | پایان خدمت",
          when: { key: "military__has", equals: "بله" },
          multiline: true
        }
      ]
    },

    {
      id: "p3_address",
     title: "نشانی اقامت",
      fields: [
        { key: "residenceIran__addressFull", label: "نشانی کامل محل سکونت در ایران", multiline: true },
        { key: "residenceIran__postalCode", label: "کد پستی", inputMode: "numeric", dir: "ltr" },
        { key: "residenceIran__phoneMobile", label: "تلفن همراه", inputMode: "numeric", dir: "ltr" },

        { key: "residenceAbroad__has", label: "اقامت خارج از کشور دارید؟", type: "choice", choices: ["بله","خیر"] },
        {
          key: "residenceAbroad__block",
          label: "اگر بله: نشانی + تلفن + مدت اقامت — مثال: «Street… | +49… | 3 سال»",
          when: { key: "residenceAbroad__has", equals: "بله" },
          multiline: true,
          dir: "ltr"
        }
      ]
    },

    {
      id: "p4_travel_extra",
      title: "سفر و تکمیلی",
      fields: [
        { key: "travel__country", label: "کشور مقصد" },
        { key: "travel__purpose", label: "منظور از سفر" },

        { key: "previousPassport__has", label: "قبلاً گذرنامه داشته‌اید؟", type: "choice", choices: ["بله","خیر"] },
        {
          key: "previousPassport__block",
         label: "جزئیات گذرنامه قبلی",
placeholder: "مثال: A1234567 | انقضا/مفقودی",
          when: { key: "previousPassport__has", equals: "بله" },
          multiline: true
        },

        {
          key: "rel1__block",

 function clearDependentFields(driverKey, driverValue) {

 function isPageComplete(page) {

  // ====== PNG TEXT RENDER (unchanged) ======
  async function drawTextAsPngOnPdf(pdfDoc, page, text, x, y, fontSize) {
    const t = String(text ?? "").trim();
    if (!t) return;

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    const pad = Math.ceil(fontSize * 0.6);

    ctx.font = `${fontSize}px Vazirmatn`;
    ctx.direction = "rtl";
    ctx.textAlign = "right";
    ctx.textBaseline = "alphabetic";

    const m = ctx.measureText(t);
    const w = Math.ceil(m.width) + pad * 2;
    const h = Math.ceil(fontSize * 1.6) + pad * 2;

    canvas.width = w;
    canvas.height = h;

    ctx.font = `${fontSize}px Vazirmatn`;
    ctx.direction = "rtl";
    ctx.textAlign = "right";
    ctx.textBaseline = "alphabetic";

    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = "#000";
    ctx.fillText(t, w - pad, h - pad);

    const dataUrl = canvas.toDataURL("image/png");
    const pngBytes = await fetch(dataUrl).then(r => r.arrayBuffer());
    const png = await pdfDoc.embedPng(pngBytes);

    const SCALE = 0.75;
    const imgW = w * SCALE;
    const imgH = h * SCALE;

    page.drawImage(png, {
      x: x - imgW + 1,
      y: y - (fontSize * SCALE),
      width: imgW,
      height: imgH,
    });
  }

  function splitFullName(fullName) {
    const t = String(fullName || "").trim().replace(/\s+/g, " ");
    if (!t) return { firstName: "", lastName: "" };
    const parts = t.split(" ");
    if (parts.length === 1) return { firstName: t, lastName: "" };
    return { firstName: parts[0], lastName: parts.slice(1).join(" ") };
  }
function splitByPipeOrComma(text) {
  const t = String(text || "").trim();
  if (!t) return [];
  // جداکننده‌های رایج: | ، , ؛ ;
  return t
    .split(/[\|،,؛;]+/g)
    .map(s => s.trim())
    .filter(Boolean);
}

function parseIdCardCombo(text) {
  // انتظار: شماره | محل صدور | تاریخ صدور | سری/سریال
  const parts = splitByPipeOrComma(text);
  return {
    idNumber: parts[0] || "",
    idIssuePlace: parts[1] || "",
    idIssueDate: parts[2] || "",
    idSerialCombo: parts[3] || (String(text || "").trim())
  };
}

function parseStatusBlock(text) {
  // انتظار: جنسیت | تأهل | دین
  const parts = splitByPipeOrComma(text);

  const p0 = parts[0] || "";
  const p1 = parts[1] || "";
  const p2 = parts[2] || "";

  const gender = (p0.includes("زن") ? "زن" : (p0.includes("مرد") ? "مرد" : p0));
  // تأهل را normalize
  let marital = p1;
  if (p1.includes("مجرد")) marital = "مجرد";
  else if (p1.includes("متأهل") || p1.includes("متاهل")) marital = "متأهل";

  const religion = p2 || "";

  return { gender: String(gender || "").trim(), marital: String(marital || "").trim(), religion: String(religion || "").trim() };
}

function parseJobBlock(text) {
  // انتظار: شغل | نام موسسه | نشانی
  const parts = splitByPipeOrComma(text);
  return {
    title: parts[0] || "",
    org: parts[1] || "",
    addressFull: parts.slice(2).join(" | ") || ""
  };
}

function parseMilitaryDetailBlock(text) {
  // انتظار: شغل پیشین | نوع انفصال
  const parts = splitByPipeOrComma(text);
  return {
    job: parts[0] || "",
    exitType: parts[1] || ""
  };
}

function parseAbroadBlock(text) {
  // انتظار: نشانی | تلفن | مدت (سال)
  const parts = splitByPipeOrComma(text);
  return {
    addressFull: parts[0] || "",
    phone: parts[1] || "",
    years: parts[2] || ""
  };
}

function parsePreviousPassportBlock(text) {
  // انتظار: شماره | علت
  const parts = splitByPipeOrComma(text);
  return {
    number: parts[0] || "",
    replaceReason: parts.slice(1).join(" | ") || ""
  };
}

function parseRelativeBlock(text) {
  // انتظار: نام | شغل | نشانی | تلفن
  const parts = splitByPipeOrComma(text);
  return {
    fullName: parts[0] || "",
    job: parts[1] || "",
    address: parts[2] || "",
    phone: parts[3] || ""
  };
}

function buildExpandedAnswers(answersObj) {
  const a = Object.assign({}, answersObj);

  // 1) Full name -> first/last
  if (a["identity__fullName"]) {
    const s = splitFullName(a["identity__fullName"]);
    a["identity__firstName"] = s.firstName;
    a["identity__lastName"] = s.lastName;
  }

  // 2) idCard combo -> detailed fields
  if (a["identity__idCardCombo"]) {
    const p = parseIdCardCombo(a["identity__idCardCombo"]);
    a["identity__idNumber"] = p.idNumber;
    a["identity__idIssuePlace"] = p.idIssuePlace;
    a["identity__idIssueDate"] = p.idIssueDate;
    a["identity__idSerialCombo"] = p.idSerialCombo;
  }

  // 3) status block -> gender/marital/religion
  if (a["identity__statusBlock"]) {
    const p = parseStatusBlock(a["identity__statusBlock"]);
    if (p.gender) a["identity__gender"] = p.gender;
    if (p.marital) a["identity__marital"] = p.marital;
    if (p.religion) a["identity__religion"] = p.religion;
  }

  // 4) job block -> job__title/org/addressFull
  if (a["job__block"]) {
    const p = parseJobBlock(a["job__block"]);
    a["job__title"] = p.title;
    a["job__org"] = p.org;
    a["job__addressFull"] = p.addressFull;
  }

  // 5) marksShort -> old hasMarks
  const ms = String(a["physical__marksShort"] || "").trim();
  a["physical__hasMarks"] = ms ? "بله" : "خیر";
  // فعلاً PDF مختصات marksDesc ندارد، پس فقط hasMarks را پر می‌کنیم.

  // 6) military detail -> old keys (اگر has=بله)
  if ((String(a["military__has"] || "").trim() === "بله") && a["military__detailBlock"]) {
    const p = parseMilitaryDetailBlock(a["military__detailBlock"]);
    a["military__job"] = p.job;
    a["military__exitType"] = p.exitType;
  } else {
    a["military__job"] = a["military__job"] || "";
    a["military__exitType"] = a["military__exitType"] || "";
  }

  // 7) abroad block -> detailed (اگر has=بله)
  if ((String(a["residenceAbroad__has"] || "").trim() === "بله") && a["residenceAbroad__block"]) {
    const p = parseAbroadBlock(a["residenceAbroad__block"]);
    a["residenceAbroad__addressFull"] = p.addressFull;
    a["residenceAbroad__phone"] = p.phone;
    a["residenceAbroad__years"] = p.years;
  }

  // 8) previous passport block -> number/reason (اگر has=بله)
  if ((String(a["previousPassport__has"] || "").trim() === "بله") && a["previousPassport__block"]) {
    const p = parsePreviousPassportBlock(a["previousPassport__block"]);
    a["previousPassport__number"] = p.number;
    a["previousPassport__replaceReason"] = p.replaceReason;
  } else {
    a["previousPassport__number"] = a["previousPassport__number"] || "";
    a["previousPassport__replaceReason"] = a["previousPassport__replaceReason"] || "";
  }

  // 9) relatives blocks -> detailed keys (برای آینده PDF)
  if (a["rel1__block"]) {
    const p = parseRelativeBlock(a["rel1__block"]);
    a["rel1__fullName"] = p.fullName;
    a["rel1__job"] = p.job;
    a["rel1__address"] = p.address;
    a["rel1__phone"] = p.phone;
  }
  if (a["rel2__block"]) {
    const p = parseRelativeBlock(a["rel2__block"]);
    a["rel2__fullName"] = p.fullName;
    a["rel2__job"] = p.job;
    a["rel2__address"] = p.address;
    a["rel2__phone"] = p.phone;
  }

  // این فیلد در UI حذف است؛ برای سازگاری map خالی نگه می‌داریم
  a["identity__enFullName"] = "";

  return a;
}
